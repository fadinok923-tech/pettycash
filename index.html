<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Petty Cash TAJ</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#f8fafb;
  --s1:#ffffff;
  --s2:#f1f5f9;
  --s3:#e8f0e8;
  --bd:#e2e8f0;
  --bd2:#cbd5e1;
  --ac:#16a34a;
  --ac2:#15803d;
  --re:#dc2626;
  --gr:#16a34a;
  --tx:#0f172a;
  --mu:#64748b;
  --mu2:#475569;
  --gold:#b45309;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}

/* ── Noise texture overlay ── */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.15;}

/* ── Login ── */
#lw{position:fixed;inset:0;background:linear-gradient(135deg,#f0fdf4 0%,#ffffff 50%,#f0fdf4 100%);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px;overflow:hidden;}
#lw-canvas{position:absolute;inset:0;pointer-events:none;z-index:0;}
#lw-glow1{position:absolute;top:80px;left:80px;width:350px;height:350px;background:radial-gradient(circle,rgba(34,197,94,.15),transparent 70%);border-radius:50%;filter:blur(50px);animation:lfloat 8s ease-in-out infinite;pointer-events:none;will-change:transform;}
#lw-glow2{position:absolute;bottom:80px;right:80px;width:420px;height:420px;background:radial-gradient(circle,rgba(16,185,129,.12),transparent 70%);border-radius:50%;filter:blur(50px);animation:lfloat 8s ease-in-out infinite 4s;pointer-events:none;will-change:transform;}
#lw-glow3{position:absolute;top:50%;left:50%;width:500px;height:500px;margin:-250px 0 0 -250px;background:radial-gradient(circle,rgba(74,222,128,.08),transparent 60%);border-radius:50%;filter:blur(60px);animation:lpulse 4s ease-in-out infinite;pointer-events:none;}
@keyframes lfloat{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-20px) scale(1.05);}}
@keyframes lpulse{0%,100%{opacity:.5;}50%{opacity:1;}}
@keyframes lfadeinup{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
@keyframes lslideleft{from{opacity:0;transform:translateX(-20px);}to{opacity:1;transform:translateX(0);}}
@keyframes lslideright{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
@keyframes ldotfade{0%{opacity:1;transform:translate(-50%,-50%) scale(1.2);}100%{opacity:0;transform:translate(-50%,-50%) scale(0);}}
@keyframes lspin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes lcardfloat{0%,100%{transform:translateY(0px);}50%{transform:translateY(-12px);}}
.lb{background:rgba(255,255,255,.85);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(34,197,94,.2);border-radius:24px;padding:40px 36px;width:100%;max-width:420px;text-align:center;position:relative;z-index:10;animation:lfadeinup .7s ease-out, lcardfloat 6s ease-in-out 1s infinite;box-shadow:0 20px 60px rgba(0,0,0,.08),0 0 0 1px rgba(34,197,94,.1),inset 0 1px 0 rgba(255,255,255,.9);transition:box-shadow .4s,border-color .4s;will-change:transform;}
.lb:hover{box-shadow:0 30px 80px rgba(0,0,0,.12),0 0 40px rgba(34,197,94,.1);border-color:rgba(34,197,94,.35);}
.ll{font-size:2.4rem;font-weight:700;margin-bottom:6px;font-family:'DM Serif Display',serif;background:linear-gradient(135deg,#14532d 0%,#16a34a 50%,#22c55e 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.ll span{background:linear-gradient(135deg,#22c55e,#16a34a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.ls{font-size:.72rem;color:#6b7280;margin-bottom:32px;letter-spacing:2px;text-transform:uppercase;}
.lf{margin-bottom:16px;text-align:left;animation:lslideleft .5s ease-out both;}
.lf.lf2{animation:lslideright .5s ease-out .1s both;}
.lf label{font-size:.62rem;color:#6b7280;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:7px;display:flex;align-items:center;gap:6px;font-weight:500;}
.lf label svg{width:13px;height:13px;stroke:#6b7280;fill:none;stroke-width:2;}
.lf .linp-wrap{position:relative;}
.lf input{width:100%;background:#f9fafb;border:1px solid #e5e7eb;border-radius:12px;color:#111827;font-size:.92rem;padding:12px 16px;outline:none;font-family:'DM Sans',sans-serif;transition:all .3s;}
.lf input:hover{border-color:#d1d5db;}
.lf input:focus{border-color:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.15);}
.lf input::placeholder{color:#9ca3af;}
.leye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9ca3af;padding:4px;transition:color .2s;display:flex;align-items:center;}
.leye:hover{color:#22c55e;}
.leye svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;}
.lbtn{width:100%;background:linear-gradient(135deg,#22c55e,#10b981);color:#fff;border:none;border-radius:12px;padding:14px;font-size:.92rem;font-weight:700;cursor:pointer;margin-top:8px;font-family:'DM Sans',sans-serif;letter-spacing:.3px;transition:all .3s;display:flex;align-items:center;justify-content:center;gap:8px;animation:lfadeinup .6s ease-out .3s both;box-shadow:0 4px 15px rgba(34,197,94,.3);}
.lbtn:hover{background:linear-gradient(135deg,#16a34a,#059669);transform:scale(1.02);box-shadow:0 8px 30px rgba(34,197,94,.4);}
.lbtn:active{transform:scale(.98);}
.lbtn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.lbtn .lspinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:lspin .7s linear infinite;}
.lbtn svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2;transition:transform .3s;}
.lbtn:hover svg{transform:translateX(4px);}
.lerr{color:#ef4444;font-size:.8rem;margin-top:10px;min-height:18px;}
.lfoot{margin-top:20px;color:#9ca3af;font-size:.75rem;}
.ldot{position:fixed;width:6px;height:6px;border-radius:50%;pointer-events:none;transform:translate(-50%,-50%);animation:ldotfade .9s ease-out forwards;z-index:9998;filter:blur(1px);}

/* ── Sync bar ── */
#sync-bar{background:linear-gradient(90deg,#f0fdf4,#dcfce7,#f0fdf4);border-bottom:1px solid rgba(22,163,74,.2);padding:7px 22px;font-size:.7rem;color:var(--ac);display:none;align-items:center;gap:8px;letter-spacing:.3px;}
#sync-bar.show{display:flex;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--ac);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.8);}}

/* ── Header ── */
header{background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);box-shadow:0 1px 8px rgba(0,0,0,.06);padding:0 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;height:58px;}
.logo{font-size:1.2rem;font-weight:400;font-family:'DM Serif Display',serif;letter-spacing:-.3px;display:flex;align-items:center;gap:10px;}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--ac);display:inline-block;}
.logo span{color:var(--ac);}
.tabs{display:flex;gap:2px;background:var(--s2);padding:4px;border-radius:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:6px 14px;border-radius:7px;border:none;background:transparent;color:var(--mu2);font-size:.72rem;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;letter-spacing:.3px;text-transform:uppercase;transition:all .2s;}
.tab.active{background:var(--ac);color:#fff;}
.tab:hover:not(.active){color:var(--tx);background:var(--s3);}

/* ── Main ── */
.main{padding:20px 20px;max-width:1280px;margin:0 auto;}

/* ── Cards ── */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:22px;margin-bottom:18px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(22,163,74,.2),transparent);}
.ctitle{font-size:.92rem;margin-bottom:16px;color:var(--ac);font-family:'DM Serif Display',serif;letter-spacing:.3px;display:flex;align-items:center;gap:8px;}
.ctitle.g{color:var(--gr);}
.ctitle::before{content:'';width:3px;height:16px;border-radius:2px;background:currentColor;display:inline-block;}

/* ── Form grid ── */
.fg{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px;}
@media(max-width:600px){.fg{grid-template-columns:1fr 1fr;}}
@media(max-width:400px){.fg{grid-template-columns:1fr;}}
label{display:block;font-size:.62rem;color:var(--mu2);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:5px;font-weight:600;}
input,select{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:9px;color:var(--tx);font-size:.84rem;padding:9px 12px;outline:none;font-family:'DM Sans',sans-serif;transition:border-color .2s,background .2s;}
input:focus,select:focus{border-color:var(--ac);background:var(--s3);}
input[type=date]::-webkit-calendar-picker-indicator{filter:none;opacity:.6;}
select option{background:#ffffff;}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;}
.bny{background:var(--ac);color:#fff;border:none;border-radius:9px;padding:10px 22px;font-size:.84rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .2s,transform .1s;letter-spacing:.2px;}
.bny:hover{background:var(--ac2);}
.bny:active{transform:scale(.97);}
.bng{background:var(--gr);color:#fff;border:none;border-radius:9px;padding:10px 22px;font-size:.84rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .2s;letter-spacing:.2px;}
.bng:hover{background:#3ecf70;}
.btn-xl{background:var(--s2);color:var(--gr);border:1px solid rgba(74,222,128,.3);border-radius:9px;padding:10px 18px;font-size:.78rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;letter-spacing:.2px;}
.btn-xl:hover{background:rgba(74,222,128,.1);border-color:var(--gr);}

/* ── Stats ── */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:18px;}
@media(max-width:500px){.stats{grid-template-columns:repeat(2,1fr);}}
.sc{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;position:relative;overflow:hidden;transition:border-color .2s;}
.sc:hover{border-color:var(--bd2);}
.sc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(22,163,74,.15),transparent);}
.scl{font-size:.58rem;color:var(--mu);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;font-weight:600;}
.scv{font-size:.94rem;font-weight:700;line-height:1.2;}
.scs{font-size:.62rem;color:var(--mu);margin-top:4px;}
.gp{color:var(--gr)!important;}
.rp{color:var(--re)!important;}
.ap{color:var(--ac)!important;}

/* ── Toolbar ── */
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
.toolbar input,.toolbar select{width:auto;font-size:.76rem;padding:7px 10px;}
.cbn{margin-left:auto;background:var(--s2);border:1px solid var(--bd);border-radius:20px;padding:3px 12px;font-size:.66rem;color:var(--mu2);font-weight:600;}
@media(max-width:500px){.toolbar{gap:6px;}.toolbar input{width:100px!important;}}

/* ── Table wrapper ── */
.tw{background:var(--s1);border:1px solid var(--bd);border-radius:14px;overflow:hidden;}
.tw-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;min-width:600px;}
thead{background:var(--s2);}
th{text-align:left;padding:11px 14px;font-size:.58rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--mu);border-bottom:1px solid var(--bd);cursor:pointer;white-space:nowrap;font-weight:700;}
th:hover{color:var(--mu2);}
td{padding:11px 14px;font-size:.81rem;border-bottom:1px solid rgba(36,45,56,.8);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(22,163,74,.04);}
.ae{color:var(--re);font-weight:600;}
.ai{color:var(--gr);font-weight:600;}
.dc{font-size:.72rem;color:var(--mu2);}
.bdg{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.65rem;font-weight:600;letter-spacing:.3px;}
.ba{background:rgba(22,163,74,.1);color:#15803d;border:1px solid rgba(22,163,74,.25);}
.bu{background:rgba(37,99,235,.08);color:#1d4ed8;border:1px solid rgba(37,99,235,.2);}
.bh{background:rgba(180,83,9,.08);color:#b45309;border:1px solid rgba(180,83,9,.2);}
.by{background:rgba(234,88,12,.08);color:#c2410c;border:1px solid rgba(234,88,12,.2);}
.bg{background:rgba(22,163,74,.1);color:#15803d;border:1px solid rgba(22,163,74,.25);}
.cb{background:var(--s3);border:1px solid var(--bd);color:var(--mu2);padding:2px 7px;border-radius:5px;font-size:.62rem;font-weight:500;}
.te{color:var(--re);border:1px solid rgba(255,107,107,.3);padding:2px 8px;border-radius:20px;font-size:.63rem;font-weight:600;}
.ti{color:var(--gr);border:1px solid rgba(74,222,128,.3);padding:2px 8px;border-radius:20px;font-size:.63rem;font-weight:600;}
.ck{width:17px;height:17px;background:var(--s2);border:1.5px solid var(--bd);border-radius:5px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:#000;transition:all .2s;}
.ck.on{background:var(--ac);border-color:var(--ac);}
.ibed{background:none;border:none;color:var(--mu);cursor:pointer;padding:4px 7px;border-radius:6px;font-size:.85rem;transition:all .2s;}
.ibed:hover{color:var(--ac);background:rgba(184,240,96,.1);}
.ibde{background:none;border:none;color:var(--mu);cursor:pointer;padding:4px 7px;border-radius:6px;font-size:.85rem;transition:all .2s;}
.ibde:hover{color:var(--re);background:rgba(255,107,107,.1);}

/* ── Totals ── */
.pg{background:var(--s1);border:1px solid var(--bd);border-radius:12px;margin-bottom:12px;overflow:hidden;}
.pgh{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;background:var(--s2);border-bottom:1px solid var(--bd);}
.pgr{display:flex;gap:12px;padding:9px 18px;border-bottom:1px solid rgba(36,45,56,.8);font-size:.8rem;align-items:center;}
.pgr:last-child{border-bottom:none;}
.pgrd{font-size:.68rem;color:var(--mu2);min-width:70px;}
.pgrdsc{flex:1;}
.pgra{color:var(--re);min-width:95px;text-align:right;font-weight:700;}

/* ── Categories ── */
.ci{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;background:var(--s2);border:1px solid var(--bd);border-radius:9px;margin-bottom:6px;transition:border-color .2s;}
.ci:hover{border-color:var(--bd2);}
.cdl{background:none;border:none;color:var(--re);cursor:pointer;font-size:.74rem;padding:3px 8px;border-radius:5px;transition:background .2s;}
.cdl:hover{background:rgba(255,107,107,.1);}

/* ── Statement ── */
.sflt{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap;background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:14px 18px;}
.sflt-lbl{font-size:.62rem;color:var(--mu2);text-transform:uppercase;letter-spacing:1px;font-weight:600;}
.sflt input[type=date]{width:auto;padding:7px 12px;font-size:.8rem;}
.sflt select{width:auto;padding:7px 10px;font-size:.8rem;}
.sflt-sep{flex:1;}
@media(max-width:600px){.sflt{gap:8px;}.sflt-sep{display:none;}}
.sflt-clr{background:none;border:1px solid var(--bd);color:var(--mu2);border-radius:8px;padding:7px 14px;cursor:pointer;font-size:.76rem;font-family:'DM Sans',sans-serif;transition:all .2s;}
.sflt-clr:hover{border-color:var(--ac);color:var(--ac);}
.sflt-dl{background:var(--ac);color:#fff;border:none;border-radius:8px;padding:7px 16px;cursor:pointer;font-size:.76rem;font-weight:700;font-family:'DM Sans',sans-serif;transition:background .2s;}
.sflt-dl:hover{background:var(--ac2);}
.sflt-xl{background:var(--s2);color:var(--gr);border:1px solid rgba(74,222,128,.3);border-radius:8px;padding:7px 16px;cursor:pointer;font-size:.76rem;font-weight:700;font-family:'DM Sans',sans-serif;transition:all .2s;}
.sflt-xl:hover{background:rgba(74,222,128,.1);}

/* ── Statement cards ── */
.stc{background:var(--s1);border:1px solid var(--bd);border-radius:16px;margin-bottom:22px;overflow:hidden;}
.sth{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;background:var(--s2);border-bottom:1px solid var(--bd);}
.sth-left{display:flex;align-items:center;gap:12px;}
.sth-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75rem;flex-shrink:0;}
.sth-name{font-size:.9rem;font-weight:700;}
.sth-meta{font-size:.64rem;color:var(--mu2);margin-top:2px;}
.sth-bal{text-align:right;}
.sth-bal-lbl{font-size:.56rem;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;font-weight:600;}
.sth-bal-val{font-size:.94rem;font-weight:700;}
.stbl{width:100%;border-collapse:collapse;}
.stbl thead tr{background:var(--s2);}
.stbl th{padding:9px 16px;font-size:.58rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--mu);font-weight:700;border-bottom:1px solid var(--bd);white-space:nowrap;}
.stbl th.r{text-align:right;}
.stbl td{padding:10px 16px;font-size:.82rem;border-bottom:1px solid rgba(36,45,56,.6);vertical-align:middle;}
.stbl td.r{text-align:right;font-weight:600;}
.stbl tr:last-child td{border-bottom:none;}
.stbl tr:hover td{background:rgba(22,163,74,.03);}
.td-date{font-size:.68rem;color:var(--mu2);white-space:nowrap;}
.td-cat{font-size:.6rem;background:var(--s3);border:1px solid var(--bd);color:var(--mu2);padding:2px 7px;border-radius:5px;text-transform:uppercase;font-weight:500;}
.td-inc{color:var(--gr)!important;}
.td-exp{color:var(--re)!important;}
.td-bal-pos{color:var(--gr)!important;}
.td-bal-neg{color:var(--re)!important;}
.stbl tr.fr-row td{border-top:2px solid var(--bd);font-weight:700;background:rgba(22,163,74,.05);}

/* ── Modal ── */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);z-index:8888;display:none;align-items:center;justify-content:center;padding:20px;}
.mbg.open{display:flex;}
.mbox{background:var(--s1);border:1px solid var(--bd);border-radius:18px;padding:28px;width:100%;max-width:360px;position:relative;}
.mbox::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(22,163,74,.4),transparent);}
.mttl{font-size:1rem;color:var(--ac);margin-bottom:16px;font-family:'DM Serif Display',serif;}
.mf{margin-bottom:12px;}
.mf label{font-size:.62rem;color:var(--mu2);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;display:block;font-weight:600;}
.mf input{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:9px;color:var(--tx);font-size:.86rem;padding:9px 12px;outline:none;font-family:'DM Sans',sans-serif;}
.mf input:focus{border-color:var(--ac);}
.mbtns{display:flex;gap:8px;margin-top:16px;}
.msav{flex:1;background:var(--ac);color:#fff;border:none;border-radius:9px;padding:10px;font-size:.84rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}
.mcan{flex:1;background:var(--s2);color:var(--tx);border:1px solid var(--bd);border-radius:9px;padding:10px;font-size:.84rem;cursor:pointer;font-family:'DM Sans',sans-serif;}

/* ── User page tabs ── */
.upb{background:#fff;border:1.5px solid #e2e8f0;border-radius:20px;padding:7px 18px;font-size:.75rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;color:#475569;transition:all .2s;letter-spacing:.3px;}
.upb:hover{border-color:#16a34a;color:#16a34a;background:#f0fdf4;}
.upb.active{background:#16a34a;border-color:#16a34a;color:#fff;box-shadow:0 2px 8px rgba(22,163,74,.25);}

// ── FIX: Add Expense ──
// Keeps "Paid By" selected, resets date to today, clears only amount/description/category
async function addExp(){
  var dtRaw=document.getElementById('ed').value;
  var ds=document.getElementById('edsc').value.trim();
  var amRaw=document.getElementById('eamt').value;
  var am=parseFloat(amRaw);
  var wh=document.getElementById('epd').value;
  var ct=getEC();
  var dt=todayStr();
  if(dtRaw){
    if(/^[0-9]{4}-[0-9]{2}-[0-9]{2}$/.test(dtRaw)) dt=dtRaw;
    else if(/^[0-9]{2}..[0-9]{2}..[0-9]{4}$/.test(dtRaw)){
      var pts=dtRaw.replace(/[^0-9]/g,'-').split('-');
      if(pts.length===3) dt=pts[2]+'-'+pts[1]+'-'+pts[0];
    }
  }
  if(!wh){toast('Please select Paid By','#ff6b6b');return;}
  if(!ct){toast('Please select a Category','#ff6b6b');return;}
  if(!amRaw||isNaN(am)||am<=0){toast('Please enter a valid Amount','#ff6b6b');return;}
  try{
    if(BASE_E.indexOf(ct)<0&&ECAT.indexOf(ct)<0) await addDoc(catCol,{type:'exp',name:ct});
    await addDoc(expCol,{dt:dt,ds:ds,am:am,wh:wh,ct:ct,dn:false});
    document.getElementById('edsc').value='';
    document.getElementById('eamt').value='';
    document.getElementById('ecat').value='';
    document.getElementById('ecn').value='';
    document.getElementById('ecn').style.display='none';
    document.getElementById('ed').value=todayStr();
    toast('Expense added ✅');
  }catch(err){
    console.error('addExp error:',err);
    toast('Save failed: '+err.message,'#ff6b6b');
  }
}

  EDITID=fid;EDITTYPE=tp;
  document.getElementById('m-ds').value=item.ds||'';
  document.getElementById('m-am').value=item.am;
  document.getElementById('m-dt').value=item.dt;
  document.getElementById('modal').classList.add('open');
}

  var ds=document.getElementById('m-ds').value.trim();

  });
  var sh=function(id,v){var el=document.getElementById(id);if(el)el.style.display=v;};
  sh('exp-form',(tab==='inc'||tab==='cats'||tab==='stmt')?'none':'block');
  sh('inc-form',tab==='inc'?'block':'none');
  sh('toolbar',(tab==='all'||tab==='todo')?'flex':'none');

  sh('totv',tab==='tot'?'block':'none');
  sh('catsv',tab==='cats'?'block':'none');
  sh('stmtv',tab==='stmt'?'block':'none');
  render();
}

// Table display
function dTable(){
  var tb=document.getElementById('tb');tb.innerHTML='';

    var fp0=FILTER_USER||document.getElementById('fp').value;
    var sr=INCS.slice();
    if(fp0)sr=sr.filter(function(e){return e.rv===fp0;});
    sr.sort(function(a,b){return b.dt.localeCompare(a.dt);});

    sr.forEach(function(e){tb.appendChild(makeRow(e,true));});return;
  }
  var fp=FILTER_USER||document.getElementById('fp').value,fc=document.getElementById('fc').value;
  var fs=document.getElementById('fs').value.toLowerCase();
  var data=EXPS.slice();
  if(TAB==='todo')data=data.filter(function(e){return!e.dn;});
  if(fp)data=data.filter(function(e){return e.wh===fp;});
  if(fc)data=data.filter(function(e){return e.ct===fc;});
  if(fs)data=data.filter(function(e){return(e.ds||'').toLowerCase().includes(fs)||e.wh.toLowerCase().includes(fs)||e.ct.toLowerCase().includes(fs);});
  data.sort(function(a,b){
    var av=SCOL==='dt'?a.dt:SCOL==='ds'?a.ds||'':SCOL==='am'?a.am:a.wh;
    var bv=SCOL==='dt'?b.dt:SCOL==='ds'?b.ds||'':SCOL==='am'?b.am:b.wh;
    return av<bv?SDIR:av>bv?-SDIR:0;
  });
  var rows=[];
  if(TAB==='all'){
    data.forEach(function(e){rows.push({t:'e',e:e});});
    var incFiltered=INCS.slice();
    if(fp)incFiltered=incFiltered.filter(function(e){return e.rv===fp;});
    incFiltered.forEach(function(e){rows.push({t:'i',e:e});});
    rows.sort(function(a,b){return b.e.dt.localeCompare(a.e.dt);});
  }else{data.forEach(function(e){rows.push({t:'e',e:e});});}
  document.getElementById('cbn').textContent=rows.length;
  if(!rows.length){
    var r=document.createElement('tr');var c=document.createElement('td');c.colSpan=7;
    c.innerHTML='<div style="text-align:center;padding:40px;color:var(--mu)">'+(TAB==='todo'?'All caught up! ✅':'No entries yet.')+'</div>';
    r.appendChild(c);tb.appendChild(r);return;
  }
  rows.forEach(function(row){tb.appendChild(makeRow(row.e,row.t==='i'));});
}

// Login animations
(function(){
  var mx=-9999, my=-9999;

  // Mouse trail + parallax
  document.addEventListener('mousemove',function(e){
    var lw=document.getElementById('lw');
    if(!lw||lw.style.display==='none'||lw.style.cssText.indexOf('none')>=0)return;
    mx=e.clientX; my=e.clientY;
    var g1=document.getElementById('lw-glow1');
    var g2=document.getElementById('lw-glow2');
    var cx=window.innerWidth/2, cy=window.innerHeight/2;
    var dx=e.clientX-cx, dy=e.clientY-cy;
    if(g1)g1.style.transform='translate('+(dx*0.06)+'px,'+(dy*0.06)+'px)';
    if(g2)g2.style.transform='translate('+(dx*0.04)+'px,'+(dy*0.04)+'px)';
    var colors=['#16a34a','#22c55e','#15803d','#4ade80','#10b981'];
    var d=document.createElement('div');
    d.className='ldot';
    d.style.cssText='position:fixed;width:6px;height:6px;border-radius:50%;pointer-events:none;z-index:9998;left:'+e.clientX+'px;top:'+e.clientY+'px;background:'+colors[Math.floor(Math.random()*colors.length)]+';transform:translate(-50%,-50%);transition:opacity .9s,transform .9s;box-shadow:0 0 8px 2px rgba(34,197,94,0.5);';
    document.body.appendChild(d);
    setTimeout(function(){d.style.opacity='0';d.style.transform='translate(-50%,-50%) scale(0)';},50);
    setTimeout(function(){if(d.parentNode)d.parentNode.removeChild(d);},950);
  });

  // Antigravity canvas particles
  var canvas=document.getElementById('lw-canvas');
  if(!canvas)return;
  var ctx=canvas.getContext('2d');
  var W,H;
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize();
  window.addEventListener('resize',resize);

  function P(){this.reset();}
  P.prototype.reset=function(){
    this.a=Math.random()*Math.PI*2;
    this.r=200+Math.random()*600;
    this.x=W/2+Math.cos(this.a)*this.r;
    this.y=H/2+Math.sin(this.a)*this.r*0.7;
    this.len=5+Math.random()*10;
    this.spd=0.3+Math.random()*1.2;
    this.as=0.0005+Math.random()*0.001;
    var pal=['#4ade80','#22c55e','#86efac','#34d399','#6ee7b7'];
    this.col=pal[Math.floor(Math.random()*pal.length)];
    this.al=Math.random()*0.4+0.2;
  };
  P.prototype.update=function(){
    this.a+=this.as;
    this.r+=this.spd;
    var tx=W/2+Math.cos(this.a)*this.r;
    var ty=H/2+Math.sin(this.a)*this.r*0.7;
    var dx=tx-mx,dy=ty-my,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<150&&dist>0){var f=(150-dist)/150;tx+=dx/dist*f*50;ty+=dy/dist*f*50;}
    this.x=tx;this.y=ty;
    if(this.r>1200)this.reset();
  };
  P.prototype.draw=function(){
    ctx.globalAlpha=this.al;
    ctx.strokeStyle=this.col;
    ctx.lineWidth=1.5;
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(this.x,this.y);
    ctx.lineTo(this.x+Math.cos(this.a+Math.PI/2)*this.len,this.y+Math.sin(this.a+Math.PI/2)*this.len);
    ctx.stroke();
  };

  var parts=[];
  for(var i=0;i<400;i++)parts.push(new P());

  function draw(){
    var lw=document.getElementById('lw');
    if(!lw||lw.style.display==='none'||lw.style.cssText.indexOf('none')>=0)return;
    ctx.globalAlpha=1;
    ctx.clearRect(0,0,W,H);
    parts.forEach(function(p){p.update();p.draw();});
    requestAnimationFrame(draw);
  }
  draw();

  // Eye toggle
  var eyeBtn=document.getElementById('leye');
  var lpEl=document.getElementById('lp');
  var eyeIcon=document.getElementById('leye-icon');
  var shown=false;
  var eyeOpen='<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  var eyeClosed='<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  if(eyeBtn){
    eyeBtn.addEventListener('click',function(e){
      e.preventDefault();
      shown=!shown;
      lpEl.type=shown?'text':'password';
      eyeIcon.innerHTML=shown?eyeClosed:eyeOpen;
    });
  }
})();
