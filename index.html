<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Petty Cash TAJ</title>
<style>
:root{--bg:#0d0d0d;--s1:#161616;--s2:#1e1e1e;--bd:#2a2a2a;--ac:#c8f55a;--re:#ff5c5c;--gr:#3fb950;--tx:#f0f0f0;--mu:#666;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:sans-serif;min-height:100vh;}
#lw{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;}
.lb{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:44px 40px;width:100%;max-width:380px;text-align:center;}
.ll{font-size:1.8rem;font-weight:900;margin-bottom:6px;font-family:Georgia,serif;}
.ll span{color:var(--ac);}
.ls{font-size:.8rem;color:var(--mu);margin-bottom:28px;}
.lf{margin-bottom:14px;text-align:left;}
.lf label{font-size:.7rem;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:block;}
.lf input{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:7px;color:var(--tx);font-size:.95rem;padding:11px 14px;outline:none;}
.lf input:focus{border-color:var(--ac);}
.lbtn{width:100%;background:var(--ac);color:#000;border:none;border-radius:7px;padding:12px;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:8px;}
.lerr{color:var(--re);font-size:.82rem;margin-top:10px;min-height:18px;}
header{background:var(--s1);border-bottom:1px solid var(--bd);padding:14px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:8px;}
.logo{font-size:1.3rem;font-weight:900;font-family:Georgia,serif;}
.logo span{color:var(--ac);}
.tabs{display:flex;gap:3px;background:var(--s2);padding:4px;border-radius:8px;flex-wrap:wrap;}
.tab{padding:6px 12px;border-radius:6px;border:none;background:transparent;color:var(--mu);font-size:.78rem;font-weight:500;cursor:pointer;white-space:nowrap;}
.tab.active{background:var(--ac);color:#000;}
.main{padding:20px 22px;max-width:1200px;margin:0 auto;}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:20px;margin-bottom:20px;}
.ctitle{font-size:1rem;margin-bottom:14px;color:var(--ac);font-family:Georgia,serif;}
.ctitle.g{color:var(--gr);}
.fg{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:14px;}
label{display:block;font-size:.68rem;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
input,select{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:7px;color:var(--tx);font-size:.86rem;padding:8px 11px;outline:none;}
input:focus,select:focus{border-color:var(--ac);}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.6);}
select option{background:#1e1e1e;}
.bny{background:var(--ac);color:#000;border:none;border-radius:7px;padding:9px 20px;font-size:.86rem;font-weight:700;cursor:pointer;}
.bng{background:var(--gr);color:#000;border:none;border-radius:7px;padding:9px 20px;font-size:.86rem;font-weight:700;cursor:pointer;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:10px;margin-bottom:18px;}
.sc{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:14px 16px;}
.scl{font-size:.61rem;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.scv{font-size:.98rem;font-weight:600;}
.scs{font-size:.66rem;color:var(--mu);margin-top:3px;}
.gp{color:var(--gr)!important;} .rp{color:var(--re)!important;}
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap;}
.toolbar input,.toolbar select{width:auto;font-size:.79rem;padding:6px 10px;}
.cbn{margin-left:auto;background:var(--s2);border:1px solid var(--bd);border-radius:20px;padding:3px 10px;font-size:.69rem;color:var(--mu);}
.tw{background:var(--s1);border:1px solid var(--bd);border-radius:10px;overflow:hidden;}
table{width:100%;border-collapse:collapse;} thead{background:var(--s2);}
th{text-align:left;padding:10px 13px;font-size:.61rem;text-transform:uppercase;letter-spacing:1px;color:var(--mu);border-bottom:1px solid var(--bd);cursor:pointer;white-space:nowrap;}
td{padding:10px 13px;font-size:.83rem;border-bottom:1px solid #1a1a1a;vertical-align:middle;}
tr:last-child td{border-bottom:none;} tr:hover td{background:rgba(255,255,255,.02);}
.ae{color:var(--re);font-weight:600;} .ai{color:var(--gr);font-weight:600;}
.dc{font-size:.76rem;color:var(--mu);}
.bdg{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.68rem;font-weight:500;}
.ba{background:rgba(200,245,90,.13);color:#c8f55a;border:1px solid rgba(200,245,90,.2);}
.bu{background:rgba(99,179,237,.13);color:#63b3ed;border:1px solid rgba(99,179,237,.2);}
.bh{background:rgba(245,200,66,.13);color:#f5c842;border:1px solid rgba(245,200,66,.2);}
.by{background:rgba(237,137,54,.13);color:#ed8936;border:1px solid rgba(237,137,54,.2);}
.bg{background:rgba(63,185,80,.13);color:#3fb950;border:1px solid rgba(63,185,80,.2);}
.cb{background:var(--s2);border:1px solid var(--bd);color:var(--mu);padding:1px 6px;border-radius:4px;font-size:.65rem;}
.te{color:var(--re);border:1px solid rgba(255,92,92,.3);padding:1px 7px;border-radius:20px;font-size:.66rem;}
.ti{color:var(--gr);border:1px solid rgba(63,185,80,.3);padding:1px 7px;border-radius:20px;font-size:.66rem;}
.ck{width:16px;height:16px;background:var(--s2);border:1.5px solid var(--bd);border-radius:4px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:#000;}
.ck.on{background:var(--ac);border-color:var(--ac);}
.ibed{background:none;border:none;color:var(--mu);cursor:pointer;padding:3px 6px;border-radius:4px;font-size:.85rem;}
.ibed:hover{color:var(--ac);}
.ibde{background:none;border:none;color:var(--mu);cursor:pointer;padding:3px 6px;border-radius:4px;font-size:.85rem;}
.ibde:hover{color:var(--re);}
.pg{background:var(--s1);border:1px solid var(--bd);border-radius:10px;margin-bottom:12px;overflow:hidden;}
.pgh{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--s2);border-bottom:1px solid var(--bd);}
.pgr{display:flex;gap:12px;padding:8px 16px;border-bottom:1px solid #1a1a1a;font-size:.82rem;align-items:center;}
.pgr:last-child{border-bottom:none;}
.pgrd{font-size:.7rem;color:var(--mu);min-width:66px;}
.pgrdsc{flex:1;} .pgra{color:var(--re);min-width:90px;text-align:right;font-weight:600;}
.ci{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--s2);border:1px solid var(--bd);border-radius:7px;margin-bottom:6px;}
.cdl{background:none;border:none;color:var(--re);cursor:pointer;font-size:.77rem;padding:3px 8px;border-radius:4px;}
.sflt{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap;background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:14px 18px;}
.sflt-lbl{font-size:.65rem;color:var(--mu);text-transform:uppercase;letter-spacing:1px;}
.sflt input[type=date]{width:auto;padding:7px 12px;font-size:.82rem;}
.sflt select{width:auto;padding:7px 10px;font-size:.82rem;}
.sflt-sep{flex:1;}
.sflt-clr{background:none;border:1px solid var(--bd);color:var(--mu);border-radius:7px;padding:7px 14px;cursor:pointer;font-size:.78rem;}
.sflt-clr:hover{border-color:var(--ac);color:var(--ac);}
.sflt-dl{background:var(--ac);color:#000;border:none;border-radius:7px;padding:7px 16px;cursor:pointer;font-size:.78rem;font-weight:700;}
.stc{background:var(--s1);border:1px solid var(--bd);border-radius:14px;margin-bottom:24px;overflow:hidden;}
.sth{padding:15px 20px;display:flex;align-items:center;justify-content:space-between;background:var(--s2);border-bottom:1px solid var(--bd);}
.sth-left{display:flex;align-items:center;gap:11px;}
.sth-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.78rem;flex-shrink:0;}
.sth-name{font-size:.92rem;font-weight:700;}
.sth-meta{font-size:.66rem;color:var(--mu);margin-top:2px;}
.sth-bal{text-align:right;}
.sth-bal-lbl{font-size:.58rem;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;}
.sth-bal-val{font-size:.96rem;font-weight:700;}
.stbl{width:100%;border-collapse:collapse;}
.stbl thead tr{background:var(--s2);}
.stbl th{padding:9px 16px;font-size:.6rem;text-transform:uppercase;letter-spacing:1.2px;color:var(--mu);font-weight:600;border-bottom:1px solid var(--bd);white-space:nowrap;}
.stbl th.r{text-align:right;}
.stbl td{padding:10px 16px;font-size:.84rem;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle;}
.stbl td.r{text-align:right;font-weight:600;}
.stbl tr:last-child td{border-bottom:none;}
.stbl tr:hover td{background:rgba(255,255,255,.025);}
.td-date{font-size:.7rem;color:var(--mu);white-space:nowrap;}
.td-cat{font-size:.62rem;background:var(--s2);border:1px solid var(--bd);color:var(--mu);padding:1px 6px;border-radius:4px;text-transform:uppercase;}
.td-inc{color:var(--gr)!important;} .td-exp{color:var(--re)!important;}
.td-bal-pos{color:var(--gr)!important;} .td-bal-neg{color:var(--re)!important;}
.stbl tr.fr-row td{border-top:2px solid var(--bd);font-weight:700;background:rgba(255,255,255,.02);}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:8888;display:none;align-items:center;justify-content:center;}
.mbg.open{display:flex;}
.mbox{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:24px;width:100%;max-width:340px;}
.mttl{font-size:1rem;color:var(--ac);margin-bottom:14px;font-family:Georgia,serif;}
.mf{margin-bottom:11px;}
.mf label{font-size:.67rem;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;display:block;}
.mf input{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:7px;color:var(--tx);font-size:.87rem;padding:8px 11px;outline:none;}
.mbtns{display:flex;gap:8px;margin-top:14px;}
.msav{flex:1;background:var(--ac);color:#000;border:none;border-radius:7px;padding:9px;font-size:.86rem;font-weight:700;cursor:pointer;}
.mcan{flex:1;background:var(--s2);color:var(--tx);border:1px solid var(--bd);border-radius:7px;padding:9px;font-size:.86rem;cursor:pointer;}
.toast{position:fixed;bottom:22px;right:22px;background:var(--ac);color:#000;padding:10px 17px;border-radius:8px;font-size:.81rem;font-weight:600;z-index:9999;transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}
</style>
</head>
<body>

<div id="lw">
  <div class="lb">
    <div class="ll">Petty Cash <span>TAJ</span></div>
    <div class="ls">Secure Team Expense Tracker</div>
    <div class="lf"><label>Username</label><input type="text" id="lu" placeholder="e.g. Admin"/></div>
    <div class="lf"><label>Password</label><input type="password" id="lp" placeholder="Password"/></div>
    <button class="lbtn" id="lbtn">Sign In</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<header>
  <div class="logo">Petty Cash <span>TAJ</span></div>
  <div class="tabs">
    <button class="tab active" id="tab-all"  onclick="setTab('all')">All</button>
    <button class="tab"        id="tab-inc"  onclick="setTab('inc')">Income</button>
    <button class="tab"        id="tab-todo" onclick="setTab('todo')">To-Do</button>
    <button class="tab"        id="tab-tot"  onclick="setTab('tot')">Totals</button>
    <button class="tab"        id="tab-cats" onclick="setTab('cats')">Categories</button>
    <button class="tab"        id="tab-stmt" onclick="setTab('stmt')">Statement</button>
  </div>
</header>

<div class="main">

<div class="card" id="exp-form">
  <div class="ctitle">+ Add Expense</div>
  <div class="fg">
    <div><label>Date</label><input type="date" id="ed"/></div>
    <div><label>Description (optional)</label><input type="text" id="edsc" placeholder="e.g. Food"/></div>
    <div><label>Amount SAR</label><input type="number" id="eamt" placeholder="0.00" min="0" step="0.01"/></div>
    <div><label>Paid By</label>
      <select id="epd">
        <option value="">- Select -</option>
        <option>Ansar Babu</option><option>Ubaid</option><option>Hassan</option><option>Ayaz</option>
      </select>
    </div>
    <div><label>Category</label>
      <select id="ecat" onchange="onEC()">
        <option value="">- Select -</option>
        <option>Machine Maintenance - Oil</option><option>Other</option>
        <option value="NEW_EXP">+ Add new...</option>
      </select>
      <input type="text" id="ecn" placeholder="New category" style="display:none;margin-top:6px"/>
    </div>
  </div>
  <button class="bny" onclick="addExp()">Add Expense</button>
</div>

<div class="card" id="inc-form" style="display:none">
  <div class="ctitle g">+ Add Income</div>
  <div class="fg">
    <div><label>Date</label><input type="date" id="ind"/></div>
    <div><label>Description (optional)</label><input type="text" id="indsc" placeholder="e.g. Sales"/></div>
    <div><label>Amount SAR</label><input type="number" id="inamt" placeholder="0.00" min="0" step="0.01"/></div>
    <div><label>Received By</label>
      <select id="inrv">
        <option value="">- Select -</option>
        <option>Ansar Babu</option><option>Ubaid</option><option>Hassan</option><option>Ayaz</option><option>Admin</option>
      </select>
    </div>
    <div><label>Source</label>
      <select id="icat" onchange="onIC()">
        <option value="">- Select -</option>
        <option>Cash Received</option>
        <option value="NEW_INC">+ Add new...</option>
      </select>
      <input type="text" id="icn" placeholder="New source" style="display:none;margin-top:6px"/>
    </div>
  </div>
  <button class="bng" onclick="addInc()">Add Income</button>
</div>

<div class="stats" id="stats"></div>

<div class="toolbar" id="toolbar">
  <select id="fp" onchange="dTable()">
    <option value="">All People</option>
    <option>Ansar Babu</option><option>Ubaid</option><option>Hassan</option><option>Ayaz</option>
  </select>
  <select id="fc" onchange="dTable()">
    <option value="">All Categories</option>
    <option>Machine Maintenance - Oil</option><option>Other</option>
  </select>
  <input type="text" id="fs" placeholder="Search..." oninput="dTable()" style="width:120px"/>
  <span class="cbn" id="cbn">0</span>
</div>

<div id="tv">
  <div class="tw"><table>
    <thead><tr>
      <th onclick="srt('dt')">Date</th>
      <th onclick="srt('ds')">Description</th>
      <th onclick="srt('am')">Amount</th>
      <th onclick="srt('wh')">Person</th>
      <th>Type</th><th>Entered</th><th>Actions</th>
    </tr></thead>
    <tbody id="tb"></tbody>
  </table></div>
</div>

<div id="totv" style="display:none"></div>

<div id="catsv" style="display:none">
  <div class="card"><div class="ctitle">Categories</div><div id="catsb"></div></div>
</div>

<div id="stmtv" style="display:none">
  <div class="sflt">
    <span class="sflt-lbl">Person</span>
    <select id="spu" onchange="dStmt()">
      <option value="">All People</option>
      <option>Ansar Babu</option><option>Ubaid</option><option>Hassan</option><option>Ayaz</option><option>Admin</option>
    </select>
    <span class="sflt-lbl">From</span>
    <input type="date" id="sf" onchange="dStmt()"/>
    <span class="sflt-lbl">To</span>
    <input type="date" id="st" onchange="dStmt()"/>
    <div class="sflt-sep"></div>
    <button class="sflt-clr" id="btn-clr">Clear</button>
    <button class="sflt-dl"  id="btn-pdf">&#8681; Download PDF</button>
  </div>
  <div id="stmtb"></div>
</div>

</div><!-- .main -->

<div class="mbg" id="modal">
  <div class="mbox">
    <div class="mttl">Edit Entry</div>
    <div class="mf"><label>Description</label><input type="text" id="m-ds"/></div>
    <div class="mf"><label>Amount SAR</label><input type="number" id="m-am" min="0" step="0.01"/></div>
    <div class="mf"><label>Date</label><input type="date" id="m-dt"/></div>
    <div class="mbtns">
      <button class="msav" id="btn-save">Save</button>
      <button class="mcan" id="btn-cancel">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

function mn(n){return 'SAR '+Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}

// ── Category dropdowns ───────────────────────────────────────
function rebuildECat(){
  var sel=document.getElementById('ecat'),cur=sel.value;
  while(sel.options.length)sel.remove(0);
  var all=[''].concat(BASE_E).concat(ECAT).concat(['NEW_EXP']);
  for(var i=0;i<all.length;i++){
    var lbl=all[i]===''?'- Select -':all[i]==='NEW_EXP'?'+ Add new...':all[i];
    sel.add(new Option(lbl,all[i]));
  }
  if(cur)sel.value=cur;
  var fc=document.getElementById('fc'),fv=fc.value;
  while(fc.options.length)fc.remove(0);
  var fo=[''].concat(BASE_E).concat(ECAT);
  for(var i=0;i<fo.length;i++)fc.add(new Option(fo[i]===''?'All Categories':fo[i],fo[i]));
  if(fv)fc.value=fv;
}
function rebuildICat(){
  var sel=document.getElementById('icat'),cur=sel.value;
  while(sel.options.length)sel.remove(0);
  var all=[''].concat(BASE_I).concat(ICAT).concat(['NEW_INC']);
  for(var i=0;i<all.length;i++){
    var lbl=all[i]===''?'- Select -':all[i]==='NEW_INC'?'+ Add new...':all[i];
    sel.add(new Option(lbl,all[i]));
  }
  if(cur)sel.value=cur;
}
function onEC(){document.getElementById('ecn').style.display=document.getElementById('ecat').value==='NEW_EXP'?'block':'none';}
function onIC(){document.getElementById('icn').style.display=document.getElementById('icat').value==='NEW_INC'?'block':'none';}
function getEC(){var v=document.getElementById('ecat').value;return v==='NEW_EXP'?document.getElementById('ecn').value.trim():v;}
function getIC(){var v=document.getElementById('icat').value;return v==='NEW_INC'?document.getElementById('icn').value.trim():v;}

// ── Add entries ──────────────────────────────────────────────
function addExp(){
  var dt=document.getElementById('ed').value;
  var ds=document.getElementById('edsc').value.trim();
  var am=parseFloat(document.getElementById('eamt').value);
  var wh=document.getElementById('epd').value;
  var ct=getEC();
  if(!dt||!wh||!ct||isNaN(am)||am<=0){toast('Fill Date, Amount, Paid By and Category');return;}
  if(BASE_E.indexOf(ct)<0&&ECAT.indexOf(ct)<0){ECAT.push(ct);rebuildECat();}
  EXPS.push({id:Date.now(),dt:dt,ds:ds,am:am,wh:wh,ct:ct,dn:false});
  save();
  document.getElementById('edsc').value='';
  document.getElementById('eamt').value='';
  document.getElementById('epd').value='';
  document.getElementById('ecat').value='';
  document.getElementById('ecn').value='';
  document.getElementById('ecn').style.display='none';
  toast('Expense added');render();
}
function addInc(){
  var dt=document.getElementById('ind').value;
  var ds=document.getElementById('indsc').value.trim();
  var am=parseFloat(document.getElementById('inamt').value);
  var rv=document.getElementById('inrv').value;
  var ct=getIC();
  if(!dt||!rv||!ct||isNaN(am)||am<=0){toast('Fill Date, Amount, Received By and Source');return;}
  if(BASE_I.indexOf(ct)<0&&ICAT.indexOf(ct)<0){ICAT.push(ct);rebuildICat();}
  INCS.push({id:Date.now(),dt:dt,ds:ds,am:am,rv:rv,ct:ct});
  save();
  document.getElementById('indsc').value='';
  document.getElementById('inamt').value='';
  document.getElementById('inrv').value='';
  document.getElementById('icat').value='';
  document.getElementById('icn').value='';
  document.getElementById('icn').style.display='none';
  toast('Income added');render();
}

// ── Delete / toggle ──────────────────────────────────────────
function dlExp(id){if(!confirm('Delete?'))return;EXPS=EXPS.filter(function(x){return x.id!==id;});save();render();}
function dlInc(id){if(!confirm('Delete?'))return;INCS=INCS.filter(function(x){return x.id!==id;});save();render();}
function tgDn(id){
  for(var i=0;i<EXPS.length;i++){if(EXPS[i].id===id){EXPS[i].dn=!EXPS[i].dn;save();render();return;}}
}

// ── Edit modal ───────────────────────────────────────────────
function opEdit(tp,id){
  var list=tp==='e'?EXPS:INCS,item=null;
  for(var i=0;i<list.length;i++)if(list[i].id===id){item=list[i];break;}
  if(!item)return;
  EDITID=id;EDITTYPE=tp;
  document.getElementById('m-ds').value=item.ds||'';
  document.getElementById('m-am').value=item.am;
  document.getElementById('m-dt').value=item.dt;
  document.getElementById('modal').classList.add('open');
}
function svEdit(){
  var ds=document.getElementById('m-ds').value.trim();
  var am=parseFloat(document.getElementById('m-am').value);
  var dt=document.getElementById('m-dt').value;
  if(!dt||isNaN(am)||am<=0){toast('Fill all fields');return;}
  var list=EDITTYPE==='e'?EXPS:INCS;
  for(var i=0;i<list.length;i++){
    if(list[i].id===EDITID){list[i].ds=ds;list[i].am=am;list[i].dt=dt;break;}
  }
  save();
  document.getElementById('modal').classList.remove('open');
  render();toast('Updated');
}

// ── Custom category delete ───────────────────────────────────
function delEC(c){if(!confirm('Delete: '+c+'?'))return;ECAT=ECAT.filter(function(x){return x!==c;});save();rebuildECat();dCats();}
function delIC(c){if(!confirm('Delete: '+c+'?'))return;ICAT=ICAT.filter(function(x){return x!==c;});save();rebuildICat();dCats();}

// ── Sort ─────────────────────────────────────────────────────
function srt(col){if(SCOL===col)SDIR=-SDIR;else{SCOL=col;SDIR=-1;}dTable();}

// ── Tab switching ────────────────────────────────────────────
function setTab(tab){
  TAB=tab;
  var all=['all','inc','todo','tot','cats','stmt'];
  for(var i=0;i<all.length;i++){
    var el=document.getElementById('tab-'+all[i]);
    if(el)el.className='tab'+(all[i]===tab?' active':'');
  }
  var sh=function(id,v){var el=document.getElementById(id);if(el)el.style.display=v;};
  sh('exp-form',(tab==='inc'||tab==='cats'||tab==='stmt')?'none':'block');
  sh('inc-form',tab==='inc'?'block':'none');
  sh('toolbar',(tab==='all'||tab==='todo')?'flex':'none');
  sh('tv',(tab==='all'||tab==='inc'||tab==='todo')?'block':'none');
  sh('totv',tab==='tot'?'block':'none');
  sh('catsv',tab==='cats'?'block':'none');
  sh('stmtv',tab==='stmt'?'block':'none');
  render();
}

// ── Stats cards ──────────────────────────────────────────────
function dStats(){
  var te=0,ti=0,pd=0;
  for(var i=0;i<EXPS.length;i++){te+=EXPS[i].am;if(!EXPS[i].dn)pd++;}
  for(var i=0;i<INCS.length;i++)ti+=INCS[i].am;
  var bl=ti-te;
  var el=document.getElementById('stats');el.innerHTML='';
  function sc(lbl,val,cls,sub){
    var d=document.createElement('div');d.className='sc';
    d.innerHTML='<div class="scl">'+lbl+'<\/div><div class="scv '+cls+'">'+val+'<\/div><div class="scs">'+sub+'<\/div>';
    el.appendChild(d);
  }
  sc('Total Income',mn(ti),'gp',INCS.length+' entries');
  sc('Total Expenses',mn(te),'rp',EXPS.length+' entries');
  sc('Balance',mn(Math.abs(bl)),bl>=0?'gp':'rp',bl>=0?'Surplus':'Deficit');
  sc('Pending',pd,'rp','not entered');
  var PP=['Ansar Babu','Ubaid','Hassan','Ayaz'];
  for(var pi=0;pi<PP.length;pi++){
    var p=PP[pi],pe=0,pi2=0,ec=0,ic=0;
    for(var i=0;i<EXPS.length;i++)if(EXPS[i].wh===p){pe+=EXPS[i].am;ec++;}
    for(var i=0;i<INCS.length;i++)if(INCS[i].rv===p){pi2+=INCS[i].am;ic++;}
    var pb=pi2-pe;
    sc(p,mn(Math.abs(pb)),pb>=0?'gp':'rp',(pb>=0?'Surplus':'Deficit')+' · '+ec+'e/'+ic+'i');
  }
}

// ── Table row builder ────────────────────────────────────────
function makeRow(e,isInc){
  var tr=document.createElement('tr');
  if(isInc)tr.style.borderLeft='3px solid rgba(63,185,80,.35)';
  function td(cls,html){var c=document.createElement('td');c.className=cls||'';c.innerHTML=html||'';return c;}
  tr.appendChild(td('dc',fd(e.dt)));
  tr.appendChild(td('',(e.ds||'<span style="color:var(--mu)">-<\/span>')+'<br><span class="cb">'+e.ct+'<\/span>'));
  tr.appendChild(td(isInc?'ai':'ae',mn(e.am)));
  tr.appendChild(td('','<span class="bdg '+bc(isInc?e.rv:e.wh)+'">'+(isInc?e.rv:e.wh)+'<\/span>'));
  tr.appendChild(td('','<span class="'+(isInc?'ti':'te')+'">'+(isInc?'Income':'Expense')+'<\/span>'));
  if(!isInc){
    var ck=document.createElement('td');ck.style.textAlign='center';
    var dv=document.createElement('div');dv.className='ck'+(e.dn?' on':'');dv.textContent=e.dn?'✓':'';
    (function(id){dv.onclick=function(){tgDn(id);};})(e.id);
    ck.appendChild(dv);tr.appendChild(ck);
  } else {tr.appendChild(td('',''));}
  var ac=document.createElement('td');
  var be=document.createElement('button');be.className='ibed';be.textContent='✎';be.title='Edit';
  (function(tp,id){be.onclick=function(){opEdit(tp,id);};})(isInc?'i':'e',e.id);
  var bd=document.createElement('button');bd.className='ibde';bd.textContent='✕';bd.title='Delete';
  (function(tp,id){bd.onclick=function(){if(tp==='i')dlInc(id);else dlExp(id);};})(isInc?'i':'e',e.id);
  ac.appendChild(be);ac.appendChild(bd);tr.appendChild(ac);
  return tr;
}

// ── Table display ────────────────────────────────────────────
function dTable(){
  var tb=document.getElementById('tb');tb.innerHTML='';
  if(TAB==='inc'){
    var sr=INCS.slice().sort(function(a,b){return b.dt.localeCompare(a.dt);});
    document.getElementById('cbn').textContent=sr.length;
    if(!sr.length){var r=document.createElement('tr');var c=document.createElement('td');c.colSpan=7;c.innerHTML='<div style="text-align:center;padding:40px;color:var(--mu)">No income yet.<\/div>';r.appendChild(c);tb.appendChild(r);return;}
    for(var i=0;i<sr.length;i++)tb.appendChild(makeRow(sr[i],true));return;
  }
  var fp=document.getElementById('fp').value,fc=document.getElementById('fc').value;
  var fs=document.getElementById('fs').value.toLowerCase();
  var data=EXPS.slice();
  if(TAB==='todo')data=data.filter(function(e){return !e.dn;});
  if(fp)data=data.filter(function(e){return e.wh===fp;});
  if(fc)data=data.filter(function(e){return e.ct===fc;});
  if(fs)data=data.filter(function(e){return (e.ds||'').toLowerCase().indexOf(fs)>-1||e.wh.toLowerCase().indexOf(fs)>-1||e.ct.toLowerCase().indexOf(fs)>-1;});
  data.sort(function(a,b){
    var av,bv;
    if(SCOL==='dt'){av=a.dt;bv=b.dt;}
    else if(SCOL==='ds'){av=a.ds||'';bv=b.ds||'';}
    else if(SCOL==='am'){av=a.am;bv=b.am;}
    else{av=a.wh;bv=b.wh;}
    return av<bv?SDIR:av>bv?-SDIR:0;
  });
  var rows=[];
  if(TAB==='all'){
    for(var i=0;i<data.length;i++)rows.push({t:'e',e:data[i]});
    for(var i=0;i<INCS.length;i++)rows.push({t:'i',e:INCS[i]});
    rows.sort(function(a,b){return b.e.dt.localeCompare(a.e.dt);});
  } else {for(var i=0;i<data.length;i++)rows.push({t:'e',e:data[i]});}
  document.getElementById('cbn').textContent=rows.length;
  if(!rows.length){
    var r=document.createElement('tr');var c=document.createElement('td');c.colSpan=7;
    c.innerHTML='<div style="text-align:center;padding:40px;color:var(--mu)">'+(TAB==='todo'?'All caught up! ✅':'No entries yet.')+'<\/div>';
    r.appendChild(c);tb.appendChild(r);return;
  }
  for(var i=0;i<rows.length;i++)tb.appendChild(makeRow(rows[i].e,rows[i].t==='i'));
}

// ── Totals tab ───────────────────────────────────────────────
function dTots(){
  var el=document.getElementById('totv');el.innerHTML='';
  var PP=['Ansar Babu','Ubaid','Hassan','Ayaz'];
  for(var pi=0;pi<PP.length;pi++){
    var p=PP[pi],rows=[],tot=0,pnd=0;
    for(var i=0;i<EXPS.length;i++)if(EXPS[i].wh===p)rows.push(EXPS[i]);
    rows.sort(function(a,b){return b.dt.localeCompare(a.dt);});
    for(var i=0;i<rows.length;i++){tot+=rows[i].am;if(!rows[i].dn)pnd++;}
    var pg=document.createElement('div');pg.className='pg';
    var hd=document.createElement('div');hd.className='pgh';
    hd.innerHTML='<div style="display:flex;align-items:center;gap:8px"><span class="bdg '+bc(p)+'">'+p+'<\/span><span style="font-size:.69rem;color:var(--mu)">'+rows.length+' entries · '+pnd+' pending<\/span><\/div><div class="rp" style="font-weight:600">'+mn(tot)+'<\/div>';
    pg.appendChild(hd);
    var body=document.createElement('div');
    if(!rows.length){var r=document.createElement('div');r.className='pgr';r.style.color='var(--mu)';r.textContent='No entries';body.appendChild(r);}
    else for(var i=0;i<rows.length;i++){
      var e=rows[i];
      var r=document.createElement('div');r.className='pgr';
      r.innerHTML='<span class="pgrd">'+fd(e.dt)+'<\/span><span class="pgrdsc">'+(e.ds||'-')+'<\/span><span class="cb">'+e.ct+'<\/span><span class="pgra">'+mn(e.am)+'<\/span>';
      var ck=document.createElement('div');ck.className='ck'+(e.dn?' on':'');ck.textContent=e.dn?'✓':'';ck.style.marginLeft='6px';
      (function(id){ck.onclick=function(){tgDn(id);};})(e.id);
      r.appendChild(ck);body.appendChild(r);
    }
    pg.appendChild(body);el.appendChild(pg);
  }
}

// ── Categories tab ───────────────────────────────────────────
function dCats(){
  var el=document.getElementById('catsb');el.innerHTML='';
  function section(title,arr,fn){
    if(!arr.length)return;
    var h=document.createElement('div');h.style.marginBottom='16px';
    var t=document.createElement('div');t.style.cssText='font-size:.67rem;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-bottom:9px';t.textContent=title;h.appendChild(t);
    for(var i=0;i<arr.length;i++){
      var row=document.createElement('div');row.className='ci';
      var sp=document.createElement('span');sp.textContent=arr[i];
      var btn=document.createElement('button');btn.className='cdl';btn.textContent='✕ Delete';
      (function(c){btn.onclick=function(){fn(c);};})(arr[i]);
      row.appendChild(sp);row.appendChild(btn);h.appendChild(row);
    }
    el.appendChild(h);
  }
  section('Custom Expense Categories',ECAT,delEC);
  section('Custom Income Sources',ICAT,delIC);
  if(!ECAT.length&&!ICAT.length){
    var d=document.createElement('div');d.style.cssText='color:var(--mu);text-align:center;padding:22px;font-size:.83rem';
    d.textContent='No custom categories yet.';el.appendChild(d);
  }
}

// ── Statement tab ────────────────────────────────────────────
function dStmt(){
  var fr=document.getElementById('sf').value;
  var to=document.getElementById('st').value;
  var pu=document.getElementById('spu').value;
  var el=document.getElementById('stmtb');el.innerHTML='';
  var PP=pu?[pu]:['Ansar Babu','Ubaid','Hassan','Ayaz','Admin'];
  var AVCOLS={'Ansar Babu':'ba','Ubaid':'bu','Hassan':'bh','Ayaz':'by','Admin':'bg'};
  var any=false;
  for(var pi=0;pi<PP.length;pi++){
    var p=PP[pi],pE=[],pI=[];
    for(var i=0;i<EXPS.length;i++){
      var ex=EXPS[i];
      if(ex.wh!==p||(fr&&ex.dt<fr)||(to&&ex.dt>to))continue;
      pE.push(ex);
    }
    for(var i=0;i<INCS.length;i++){
      var inc=INCS[i];
      if(inc.rv!==p||(fr&&inc.dt<fr)||(to&&inc.dt>to))continue;
      pI.push(inc);
    }
    if(!pE.length&&!pI.length)continue;
    any=true;
    var all=[];
    for(var i=0;i<pI.length;i++)all.push({dt:pI[i].dt,ds:pI[i].ds,ct:pI[i].ct,am:pI[i].am,type:'i'});
    for(var i=0;i<pE.length;i++)all.push({dt:pE[i].dt,ds:pE[i].ds,ct:pE[i].ct,am:pE[i].am,type:'e'});
    all.sort(function(a,b){return a.dt.localeCompare(b.dt);});
    var tI=0,tE=0;
    for(var i=0;i<pI.length;i++)tI+=pI[i].am;
    for(var i=0;i<pE.length;i++)tE+=pE[i].am;
    var finalBal=tI-tE;
    // Card
    var card=document.createElement('div');card.className='stc';
    // Header
    var hd=document.createElement('div');hd.className='sth';
    var left=document.createElement('div');left.className='sth-left';
    var av=document.createElement('div');av.className='sth-avatar bdg '+(AVCOLS[p]||'bg');av.textContent=p.slice(0,2).toUpperCase();
    var info=document.createElement('div');
    var nm=document.createElement('div');nm.className='sth-name';nm.textContent=p;
    var mt=document.createElement('div');mt.className='sth-meta';mt.textContent=pI.length+' income · '+pE.length+' expenses';
    info.appendChild(nm);info.appendChild(mt);
    left.appendChild(av);left.appendChild(info);
    var bBox=document.createElement('div');bBox.className='sth-bal';
    var bLbl=document.createElement('div');bLbl.className='sth-bal-lbl';bLbl.textContent='Balance';
    var bVal=document.createElement('div');bVal.className='sth-bal-val '+(finalBal>=0?'gp':'rp');
    bVal.textContent=(finalBal>=0?'+':'')+mn(finalBal);
    bBox.appendChild(bLbl);bBox.appendChild(bVal);
    hd.appendChild(left);hd.appendChild(bBox);card.appendChild(hd);
    // Table
    var tbl=document.createElement('table');tbl.className='stbl';
    var thead=document.createElement('thead');
    var hr=document.createElement('tr');
    function mth(txt,r){var t=document.createElement('th');t.textContent=txt;if(r)t.className='r';return t;}
    hr.appendChild(mth('Date'));hr.appendChild(mth('Description'));hr.appendChild(mth('Category'));
    hr.appendChild(mth('Income',true));hr.appendChild(mth('Expense',true));hr.appendChild(mth('Balance',true));
    thead.appendChild(hr);tbl.appendChild(thead);
    var tbody=document.createElement('tbody'),running=0;
    for(var i=0;i<all.length;i++){
      var row=all[i],isI=(row.type==='i');
      if(isI)running+=row.am;else running-=row.am;
      var tr=document.createElement('tr');
      function mkTd(cls,txt){var c=document.createElement('td');c.className=cls||'';c.textContent=txt||'';return c;}
      tr.appendChild(mkTd('td-date',fd(row.dt)));
      tr.appendChild(mkTd('',row.ds||'—'));
      var cTd=document.createElement('td');var cSp=document.createElement('span');cSp.className='td-cat';cSp.textContent=row.ct;cTd.appendChild(cSp);tr.appendChild(cTd);
      tr.appendChild(mkTd('r'+(isI?' td-inc':''),isI?mn(row.am):''));
      tr.appendChild(mkTd('r'+(!isI?' td-exp':''),!isI?mn(row.am):''));
      tr.appendChild(mkTd('r '+(running>=0?'td-bal-pos':'td-bal-neg'),mn(running)));
      tbody.appendChild(tr);
    }
    // Totals row
    var trF=document.createElement('tr');trF.className='fr-row';
    var tdL=document.createElement('td');tdL.colSpan=3;tdL.style.cssText='font-size:.7rem;color:var(--mu);text-transform:uppercase;letter-spacing:1px;padding:12px 16px;';tdL.textContent='Total';trF.appendChild(tdL);
    var tdI=document.createElement('td');tdI.className='r td-inc';tdI.textContent=mn(tI);trF.appendChild(tdI);
    var tdE=document.createElement('td');tdE.className='r td-exp';tdE.textContent=mn(tE);trF.appendChild(tdE);
    var tdB=document.createElement('td');tdB.className='r '+(finalBal>=0?'td-bal-pos':'td-bal-neg');tdB.textContent=mn(finalBal);trF.appendChild(tdB);
    tbody.appendChild(trF);
    tbl.appendChild(tbody);card.appendChild(tbl);el.appendChild(card);
  }
  if(!any){
    var d=document.createElement('div');d.style.cssText='text-align:center;padding:60px 20px;color:var(--mu)';
    d.innerHTML='<div style="font-size:2.5rem;margin-bottom:12px">📋<\/div><div style="font-size:.9rem">No data found.<\/div>';
    el.appendChild(d);
  }
}

// ── Download statement PDF ───────────────────────────────────
function dlStmt(){
  var pu=document.getElementById('spu').value;
  var fr=document.getElementById('sf').value;
  var to=document.getElementById('st').value;
  var title='Petty Cash TAJ — Statement';
  if(pu)title+=' — '+pu;
  if(fr||to)title+=' ('+(fr?fd(fr):'')+(fr&&to?' to ':'')+(to?fd(to):'')+')';
  var content=document.getElementById('stmtb').innerHTML;
  if(!content||!content.trim()){alert('No statement data to download.');return;}
  var css='body{font-family:Arial,sans-serif;background:#fff;color:#111;margin:0;padding:24px;}'
    +'h1{font-size:1.1rem;font-weight:700;margin-bottom:4px;}'
    +'.sub{font-size:.78rem;color:#888;margin-bottom:20px;}'
    +'.stc{border:1px solid #ddd;border-radius:8px;margin-bottom:22px;overflow:hidden;page-break-inside:avoid;}'
    +'.sth{background:#f5f5f5;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #ddd;}'
    +'.sth-left{display:flex;align-items:center;gap:10px;}'
    +'.sth-avatar{width:32px;height:32px;border-radius:50%;background:#e0e0e0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75rem;color:#333;}'
    +'.sth-name{font-size:.9rem;font-weight:700;}'
    +'.sth-meta{font-size:.65rem;color:#888;margin-top:2px;}'
    +'.sth-bal{text-align:right;}'
    +'.sth-bal-lbl{font-size:.58rem;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;}'
    +'.sth-bal-val{font-size:.9rem;font-weight:700;}'
    +'.gp{color:#1a7a32!important;}.rp{color:#c0392b!important;}'
    +'.stbl{width:100%;border-collapse:collapse;}'
    +'.stbl th{text-align:left;padding:8px 12px;font-size:.6rem;text-transform:uppercase;letter-spacing:1px;color:#888;background:#fafafa;border-bottom:1px solid #ddd;}'
    +'.stbl th.r{text-align:right;}'
    +'.stbl td{padding:8px 12px;font-size:.82rem;border-bottom:1px solid #f0f0f0;}'
    +'.stbl td.r{text-align:right;font-weight:600;}'
    +'.stbl tr:last-child td{border-bottom:none;}'
    +'.td-date{font-size:.7rem;color:#888;}'
    +'.td-cat{font-size:.6rem;background:#f0f0f0;border:1px solid #ddd;color:#666;padding:1px 5px;border-radius:3px;}'
    +'.td-inc{color:#1a7a32!important;}.td-exp{color:#c0392b!important;}'
    +'.td-bal-pos{color:#1a7a32!important;}.td-bal-neg{color:#c0392b!important;}'
    +'.fr-row td{border-top:2px solid #ddd;font-weight:700;background:#fafafa;}'
    +'@media print{body{padding:12px;}@page{margin:15mm;}}';
  var date=new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
  var win=window.open('','_blank');
  if(!win){alert('Allow popups to download.');return;}
  win.document.open();
  win.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>');
  win.document.write(title);
  win.document.write('<\/title><style>');
  win.document.write(css);
  win.document.write('<\/style><\/head><body><h1>');
  win.document.write(title);
  win.document.write('<\/h1><div class="sub">Generated: ');
  win.document.write(date);
  win.document.write('<\/div>');
  win.document.write(content);
  win.document.write('<\/body><\/html>');
  win.document.close();
  setTimeout(function(){win.print();},600);
}

// ── Master render ─────────────────────────────────────────────
function render(){
  dStats();
  if(TAB==='tot')dTots();
  else if(TAB==='cats')dCats();
  else if(TAB==='stmt')dStmt();
  else dTable();
}

// ── Init: wire all events after DOM ready ────────────────────
window.addEventListener('load',function(){
  var d=new Date(),pad=function(n){return n<10?'0'+n:''+n;};
  var today=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
  document.getElementById('ed').value=today;
  document.getElementById('ind').value=today;
  // Login
  document.getElementById('lbtn').addEventListener('click',doLogin);
  document.getElementById('lu').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
  document.getElementById('lp').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
  // Modal
  document.getElementById('btn-save').addEventListener('click',svEdit);
  document.getElementById('btn-cancel').addEventListener('click',function(){document.getElementById('modal').classList.remove('open');});
  // Statement filters
  document.getElementById('btn-clr').addEventListener('click',function(){
    document.getElementById('sf').value='';
    document.getElementById('st').value='';
    document.getElementById('spu').value='';
    dStmt();
  });
  document.getElementById('btn-pdf').addEventListener('click',dlStmt);
  // Init
  rebuildECat();
  rebuildICat();
  render();
});
</script>
