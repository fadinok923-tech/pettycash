<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Petty Cash TAJ</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#080b0f;
  --s1:#0f1318;
  --s2:#161c23;
  --s3:#1d252f;
  --bd:#242d38;
  --bd2:#2e3a47;
  --ac:#b8f060;
  --ac2:#8fd43a;
  --re:#ff6b6b;
  --gr:#4ade80;
  --tx:#e8edf2;
  --mu:#5a6a7a;
  --mu2:#7a8a9a;
  --gold:#f0c060;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}

/* ── Noise texture overlay ── */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4;}

/* ── Login ── */
#lw{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px;}
.lb{background:var(--s1);border:1px solid var(--bd);border-radius:20px;padding:48px 44px;width:100%;max-width:400px;text-align:center;position:relative;overflow:hidden;}
.lb::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(184,240,96,.12),transparent 70%);pointer-events:none;}
.lb::after{content:'';position:absolute;bottom:-40px;left:-40px;width:150px;height:150px;background:radial-gradient(circle,rgba(74,222,128,.08),transparent 70%);pointer-events:none;}
.ll{font-size:2rem;font-weight:400;margin-bottom:4px;font-family:'DM Serif Display',serif;letter-spacing:-.5px;}
.ll span{color:var(--ac);}
.ls{font-size:.78rem;color:var(--mu);margin-bottom:32px;letter-spacing:.5px;text-transform:uppercase;}
.lf{margin-bottom:16px;text-align:left;}
.lf label{font-size:.65rem;color:var(--mu2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;display:block;}
.lf input{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:10px;color:var(--tx);font-size:.92rem;padding:12px 16px;outline:none;font-family:'DM Sans',sans-serif;transition:border-color .2s;}
.lf input:focus{border-color:var(--ac);}
.lbtn{width:100%;background:var(--ac);color:#000;border:none;border-radius:10px;padding:13px;font-size:.92rem;font-weight:700;cursor:pointer;margin-top:10px;font-family:'DM Sans',sans-serif;letter-spacing:.3px;transition:background .2s,transform .1s;}
.lbtn:hover{background:var(--ac2);}
.lbtn:active{transform:scale(.98);}
.lerr{color:var(--re);font-size:.8rem;margin-top:10px;min-height:18px;}

/* ── Sync bar ── */
#sync-bar{background:linear-gradient(90deg,#0a1a0a,#0f2010,#0a1a0a);border-bottom:1px solid rgba(184,240,96,.2);padding:7px 22px;font-size:.7rem;color:var(--ac);display:none;align-items:center;gap:8px;letter-spacing:.3px;}
#sync-bar.show{display:flex;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--ac);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.8);}}

/* ── Header ── */
header{background:rgba(8,11,15,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);padding:0 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;height:58px;}
.logo{font-size:1.2rem;font-weight:400;font-family:'DM Serif Display',serif;letter-spacing:-.3px;display:flex;align-items:center;gap:10px;}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--ac);display:inline-block;}
.logo span{color:var(--ac);}
.tabs{display:flex;gap:2px;background:var(--s2);padding:4px;border-radius:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:6px 14px;border-radius:7px;border:none;background:transparent;color:var(--mu2);font-size:.72rem;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;letter-spacing:.3px;text-transform:uppercase;transition:all .2s;}
.tab.active{background:var(--ac);color:#000;}
.tab:hover:not(.active){color:var(--tx);background:var(--s3);}

/* ── Main ── */
.main{padding:20px 20px;max-width:1280px;margin:0 auto;}

/* ── Cards ── */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:22px;margin-bottom:18px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(184,240,96,.3),transparent);}
.ctitle{font-size:.92rem;margin-bottom:16px;color:var(--ac);font-family:'DM Serif Display',serif;letter-spacing:.3px;display:flex;align-items:center;gap:8px;}
.ctitle.g{color:var(--gr);}
.ctitle::before{content:'';width:3px;height:16px;border-radius:2px;background:currentColor;display:inline-block;}

/* ── Form grid ── */
.fg{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px;}
@media(max-width:600px){.fg{grid-template-columns:1fr 1fr;}}
@media(max-width:400px){.fg{grid-template-columns:1fr;}}
label{display:block;font-size:.62rem;color:var(--mu2);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:5px;font-weight:600;}
input,select{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:9px;color:var(--tx);font-size:.84rem;padding:9px 12px;outline:none;font-family:'DM Sans',sans-serif;transition:border-color .2s,background .2s;}
input:focus,select:focus{border-color:var(--ac);background:var(--s3);}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.5);}
select option{background:var(--s2);}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;}
.bny{background:var(--ac);color:#000;border:none;border-radius:9px;padding:10px 22px;font-size:.84rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .2s,transform .1s;letter-spacing:.2px;}
.bny:hover{background:var(--ac2);}
.bny:active{transform:scale(.97);}
.bng{background:var(--gr);color:#000;border:none;border-radius:9px;padding:10px 22px;font-size:.84rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .2s;letter-spacing:.2px;}
.bng:hover{background:#3ecf70;}
.btn-xl{background:var(--s2);color:var(--gr);border:1px solid rgba(74,222,128,.3);border-radius:9px;padding:10px 18px;font-size:.78rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;letter-spacing:.2px;}
.btn-xl:hover{background:rgba(74,222,128,.1);border-color:var(--gr);}

/* ── Stats ── */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:18px;}
@media(max-width:500px){.stats{grid-template-columns:repeat(2,1fr);}}
.sc{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;position:relative;overflow:hidden;transition:border-color .2s;}
.sc:hover{border-color:var(--bd2);}
.sc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(184,240,96,.15),transparent);}
.scl{font-size:.58rem;color:var(--mu);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;font-weight:600;}
.scv{font-size:.94rem;font-weight:700;line-height:1.2;}
.scs{font-size:.62rem;color:var(--mu);margin-top:4px;}
.gp{color:var(--gr)!important;}
.rp{color:var(--re)!important;}
.ap{color:var(--ac)!important;}

/* ── Toolbar ── */
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
.toolbar input,.toolbar select{width:auto;font-size:.76rem;padding:7px 10px;}
.cbn{margin-left:auto;background:var(--s2);border:1px solid var(--bd);border-radius:20px;padding:3px 12px;font-size:.66rem;color:var(--mu2);font-weight:600;}
@media(max-width:500px){.toolbar{gap:6px;}.toolbar input{width:100px!important;}}

/* ── Table wrapper ── */
.tw{background:var(--s1);border:1px solid var(--bd);border-radius:14px;overflow:hidden;}
.tw-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;min-width:600px;}
thead{background:var(--s2);}
th{text-align:left;padding:11px 14px;font-size:.58rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--mu);border-bottom:1px solid var(--bd);cursor:pointer;white-space:nowrap;font-weight:700;}
th:hover{color:var(--mu2);}
td{padding:11px 14px;font-size:.81rem;border-bottom:1px solid rgba(36,45,56,.8);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.018);}
.ae{color:var(--re);font-weight:600;}
.ai{color:var(--gr);font-weight:600;}
.dc{font-size:.72rem;color:var(--mu2);}
.bdg{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.65rem;font-weight:600;letter-spacing:.3px;}
.ba{background:rgba(184,240,96,.12);color:#b8f060;border:1px solid rgba(184,240,96,.25);}
.bu{background:rgba(99,179,237,.12);color:#63b3ed;border:1px solid rgba(99,179,237,.25);}
.bh{background:rgba(245,200,66,.12);color:#f5c842;border:1px solid rgba(245,200,66,.25);}
.by{background:rgba(237,137,54,.12);color:#ed8936;border:1px solid rgba(237,137,54,.25);}
.bg{background:rgba(74,222,128,.12);color:#4ade80;border:1px solid rgba(74,222,128,.25);}
.cb{background:var(--s3);border:1px solid var(--bd);color:var(--mu2);padding:2px 7px;border-radius:5px;font-size:.62rem;font-weight:500;}
.te{color:var(--re);border:1px solid rgba(255,107,107,.3);padding:2px 8px;border-radius:20px;font-size:.63rem;font-weight:600;}
.ti{color:var(--gr);border:1px solid rgba(74,222,128,.3);padding:2px 8px;border-radius:20px;font-size:.63rem;font-weight:600;}
.ck{width:17px;height:17px;background:var(--s2);border:1.5px solid var(--bd);border-radius:5px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:#000;transition:all .2s;}
.ck.on{background:var(--ac);border-color:var(--ac);}
.ibed{background:none;border:none;color:var(--mu);cursor:pointer;padding:4px 7px;border-radius:6px;font-size:.85rem;transition:all .2s;}
.ibed:hover{color:var(--ac);background:rgba(184,240,96,.1);}
.ibde{background:none;border:none;color:var(--mu);cursor:pointer;padding:4px 7px;border-radius:6px;font-size:.85rem;transition:all .2s;}
.ibde:hover{color:var(--re);background:rgba(255,107,107,.1);}

/* ── Totals ── */
.pg{background:var(--s1);border:1px solid var(--bd);border-radius:12px;margin-bottom:12px;overflow:hidden;}
.pgh{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;background:var(--s2);border-bottom:1px solid var(--bd);}
.pgr{display:flex;gap:12px;padding:9px 18px;border-bottom:1px solid rgba(36,45,56,.8);font-size:.8rem;align-items:center;}
.pgr:last-child{border-bottom:none;}
.pgrd{font-size:.68rem;color:var(--mu2);min-width:70px;}
.pgrdsc{flex:1;}
.pgra{color:var(--re);min-width:95px;text-align:right;font-weight:700;}

/* ── Categories ── */
.ci{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;background:var(--s2);border:1px solid var(--bd);border-radius:9px;margin-bottom:6px;transition:border-color .2s;}
.ci:hover{border-color:var(--bd2);}
.cdl{background:none;border:none;color:var(--re);cursor:pointer;font-size:.74rem;padding:3px 8px;border-radius:5px;transition:background .2s;}
.cdl:hover{background:rgba(255,107,107,.1);}

/* ── Statement ── */
.sflt{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap;background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:14px 18px;}
.sflt-lbl{font-size:.62rem;color:var(--mu2);text-transform:uppercase;letter-spacing:1px;font-weight:600;}
.sflt input[type=date]{width:auto;padding:7px 12px;font-size:.8rem;}
.sflt select{width:auto;padding:7px 10px;font-size:.8rem;}
.sflt-sep{flex:1;}
@media(max-width:600px){.sflt{gap:8px;}.sflt-sep{display:none;}}
.sflt-clr{background:none;border:1px solid var(--bd);color:var(--mu2);border-radius:8px;padding:7px 14px;cursor:pointer;font-size:.76rem;font-family:'DM Sans',sans-serif;transition:all .2s;}
.sflt-clr:hover{border-color:var(--ac);color:var(--ac);}
.sflt-dl{background:var(--ac);color:#000;border:none;border-radius:8px;padding:7px 16px;cursor:pointer;font-size:.76rem;font-weight:700;font-family:'DM Sans',sans-serif;transition:background .2s;}
.sflt-dl:hover{background:var(--ac2);}
.sflt-xl{background:var(--s2);color:var(--gr);border:1px solid rgba(74,222,128,.3);border-radius:8px;padding:7px 16px;cursor:pointer;font-size:.76rem;font-weight:700;font-family:'DM Sans',sans-serif;transition:all .2s;}
.sflt-xl:hover{background:rgba(74,222,128,.1);}

/* ── Statement cards ── */
.stc{background:var(--s1);border:1px solid var(--bd);border-radius:16px;margin-bottom:22px;overflow:hidden;}
.sth{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;background:var(--s2);border-bottom:1px solid var(--bd);}
.sth-left{display:flex;align-items:center;gap:12px;}
.sth-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75rem;flex-shrink:0;}
.sth-name{font-size:.9rem;font-weight:700;}
.sth-meta{font-size:.64rem;color:var(--mu2);margin-top:2px;}
.sth-bal{text-align:right;}
.sth-bal-lbl{font-size:.56rem;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;font-weight:600;}
.sth-bal-val{font-size:.94rem;font-weight:700;}
.stbl{width:100%;border-collapse:collapse;}
.stbl thead tr{background:var(--s2);}
.stbl th{padding:9px 16px;font-size:.58rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--mu);font-weight:700;border-bottom:1px solid var(--bd);white-space:nowrap;}
.stbl th.r{text-align:right;}
.stbl td{padding:10px 16px;font-size:.82rem;border-bottom:1px solid rgba(36,45,56,.6);vertical-align:middle;}
.stbl td.r{text-align:right;font-weight:600;}
.stbl tr:last-child td{border-bottom:none;}
.stbl tr:hover td{background:rgba(255,255,255,.02);}
.td-date{font-size:.68rem;color:var(--mu2);white-space:nowrap;}
.td-cat{font-size:.6rem;background:var(--s3);border:1px solid var(--bd);color:var(--mu2);padding:2px 7px;border-radius:5px;text-transform:uppercase;font-weight:500;}
.td-inc{color:var(--gr)!important;}
.td-exp{color:var(--re)!important;}
.td-bal-pos{color:var(--gr)!important;}
.td-bal-neg{color:var(--re)!important;}
.stbl tr.fr-row td{border-top:2px solid var(--bd);font-weight:700;background:rgba(255,255,255,.025);}

/* ── Modal ── */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);z-index:8888;display:none;align-items:center;justify-content:center;padding:20px;}
.mbg.open{display:flex;}
.mbox{background:var(--s1);border:1px solid var(--bd);border-radius:18px;padding:28px;width:100%;max-width:360px;position:relative;}
.mbox::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(184,240,96,.4),transparent);}
.mttl{font-size:1rem;color:var(--ac);margin-bottom:16px;font-family:'DM Serif Display',serif;}
.mf{margin-bottom:12px;}
.mf label{font-size:.62rem;color:var(--mu2);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;display:block;font-weight:600;}
.mf input{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:9px;color:var(--tx);font-size:.86rem;padding:9px 12px;outline:none;font-family:'DM Sans',sans-serif;}
.mf input:focus{border-color:var(--ac);}
.mbtns{display:flex;gap:8px;margin-top:16px;}
.msav{flex:1;background:var(--ac);color:#000;border:none;border-radius:9px;padding:10px;font-size:.84rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}
.mcan{flex:1;background:var(--s2);color:var(--tx);border:1px solid var(--bd);border-radius:9px;padding:10px;font-size:.84rem;cursor:pointer;font-family:'DM Sans',sans-serif;}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--ac);color:#000;padding:11px 18px;border-radius:10px;font-size:.8rem;font-weight:700;z-index:9999;transform:translateY(80px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;font-family:'DM Sans',sans-serif;letter-spacing:.2px;}
.toast.show{transform:translateY(0);opacity:1;}

/* ── Mobile bottom nav ── */
@media(max-width:640px){
  header{padding:0 14px;height:52px;}
  .logo{font-size:1rem;}
  .tabs{display:none;}
  .mob-nav{display:flex!important;}
  .main{padding:14px 12px 80px;}
  .card{padding:16px;}
  .fg{gap:10px;}
}
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(15,19,24,.96);backdrop-filter:blur(20px);border-top:1px solid var(--bd);z-index:200;padding:8px 0 env(safe-area-inset-bottom,8px);}
.mob-nav-inner{display:flex;justify-content:space-around;align-items:center;}
.mnb{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 12px;border:none;background:none;color:var(--mu);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.58rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;border-radius:8px;transition:color .2s;}
.mnb.active{color:var(--ac);}
.mnb svg{width:20px;height:20px;}

/* ── Divider ── */
.section-divider{height:1px;background:linear-gradient(90deg,transparent,var(--bd),transparent);margin:4px 0 18px;}
</style>
</head>
<body>

<!-- Login -->
<div id="lw">
  <div class="lb">
    <div class="ll">Petty Cash <span>TAJ</span></div>
    <div class="ls">Team Expense Tracker</div>
    <div class="lf"><label>Username</label><input type="text" id="lu" placeholder="e.g. Admin" autocomplete="username"/></div>
    <div class="lf"><label>Password</label><input type="password" id="lp" placeholder="Password" autocomplete="current-password"/></div>
    <button class="lbtn" id="lbtn">Sign In →</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<!-- Sync bar -->
<div id="sync-bar">
  <div class="sync-dot"></div>
  <span>Live sync active — all team members share the same data in real time</span>
</div>

<!-- Header -->
<header>
  <div class="logo"><span class="logo-dot"></span>Petty Cash <span>TAJ</span></div>
  <div class="tabs">
    <button class="tab active" id="tab-all"  onclick="setTab('all')">All</button>
    <button class="tab"        id="tab-inc"  onclick="setTab('inc')">Income</button>
    <button class="tab"        id="tab-todo" onclick="setTab('todo')">To-Do</button>
    <button class="tab"        id="tab-tot"  onclick="setTab('tot')">Totals</button>
    <button class="tab"        id="tab-cats" onclick="setTab('cats')">Categories</button>
    <button class="tab"        id="tab-stmt" onclick="setTab('stmt')">Statement</button>
  </div>
</header>

<!-- Mobile bottom nav -->
<nav class="mob-nav">
  <div class="mob-nav-inner">
    <button class="mnb active" id="mnb-all" onclick="setTab('all')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      All
    </button>
    <button class="mnb" id="mnb-inc" onclick="setTab('inc')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg>
      Income
    </button>
    <button class="mnb" id="mnb-todo" onclick="setTab('todo')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
      To-Do

  document.getElementById('modal').classList.add('open');
}
async function svEdit(){
  var ds=document.getElementById('m-ds').value.trim();
  var am=parseFloat(document.getElementById('m-am').value);
  var dt=document.getElementById('m-dt').value;
  if(!dt||isNaN(am)||am<=0){toast('Fill all fields','#ff6b6b');return;}
  await updateDoc(doc(db,EDITTYPE==='e'?'expenses':'incomes',EDITID),{ds,am,dt});
  document.getElementById('modal').classList.remove('open');
  toast('Updated ✅');
}
window.opEdit=opEdit;

// Cat delete
async function delEC(c){
  if(!confirm('Delete category: '+c+'?'))return;
  var snap=await getDocs(catCol);
  snap.forEach(async function(d){if(d.data().name===c&&d.data().type==='exp')await deleteDoc(doc(db,'categories',d.id));});
}
async function delIC(c){
  if(!confirm('Delete source: '+c+'?'))return;
  var snap=await getDocs(catCol);
  snap.forEach(async function(d){if(d.data().name===c&&d.data().type==='inc')await deleteDoc(doc(db,'categories',d.id));});

// Sort
function srt(col){if(SCOL===col)SDIR=-SDIR;else{SCOL=col;SDIR=-1;}render();}
window.srt=srt;

// Tab
function setTab(tab){
  TAB=tab;
  ['all','inc','todo','tot','cats','stmt'].forEach(function(t){
    var el=document.getElementById('tab-'+t);if(el)el.className='tab'+(t===tab?' active':'');
    var mb=document.getElementById('mnb-'+t);if(mb)mb.className='mnb'+(t===tab?' active':'');
  });
  var sh=function(id,v){var el=document.getElementById(id);if(el)el.style.display=v;};
  sh('exp-form',(tab==='inc'||tab==='cats'||tab==='stmt')?'none':'block');
  sh('inc-form',tab==='inc'?'block':'none');
  sh('toolbar',(tab==='all'||tab==='todo')?'flex':'none');
  sh('tv',(tab==='all'||tab==='inc'||tab==='todo')?'block':'none');
  sh('totv',tab==='tot'?'block':'none');
  sh('catsv',tab==='cats'?'block':'none');
  sh('stmtv',tab==='stmt'?'block':'none');
  render();
}
window.setTab=setTab;

// Stats
function dStats(){
  var te=0,ti=0,pd=0;
  EXPS.forEach(function(e){te+=e.am;if(!e.dn)pd++;});
  INCS.forEach(function(i){ti+=i.am;});
  var bl=ti-te,el=document.getElementById('stats');el.innerHTML='';
  function sc(lbl,val,cls,sub){
    var d=document.createElement('div');d.className='sc';
    d.innerHTML='<div class="scl">'+lbl+'</div><div class="scv '+cls+'">'+val+'</div><div class="scs">'+sub+'</div>';
    el.appendChild(d);
  }
  sc('Total Income',mn(ti),'gp',INCS.length+' entries');
  sc('Total Expenses',mn(te),'rp',EXPS.length+' entries');
  sc('Balance',mn(Math.abs(bl)),bl>=0?'gp':'rp',bl>=0?'Surplus':'Deficit');
  sc('Pending',pd,'rp','not entered');
  ['Ansar Babu','Ubaid','Hassan','Ayaz'].forEach(function(p){
    var pe=0,pi=0,ec=0,ic=0;
    EXPS.forEach(function(e){if(e.wh===p){pe+=e.am;ec++;}});
    INCS.forEach(function(i){if(i.rv===p){pi+=i.am;ic++;}});
    var pb=pi-pe;
    sc(p,mn(Math.abs(pb)),pb>=0?'gp':'rp',(pb>=0?'Surplus':'Deficit')+' · '+ec+'e/'+ic+'i');
  });
}

// Table row
function makeRow(e,isInc){
  var tr=document.createElement('tr');
  if(isInc)tr.style.borderLeft='3px solid rgba(74,222,128,.3)';
  function td(cls,html){var c=document.createElement('td');c.className=cls||'';c.innerHTML=html||'';return c;}
  tr.appendChild(td('dc',fd(e.dt)));
  tr.appendChild(td('',(e.ds||'<span style="color:var(--mu)">—</span>')+'<br><span class="cb">'+e.ct+'</span>'));
  tr.appendChild(td(isInc?'ai':'ae',mn(e.am)));
  tr.appendChild(td('','<span class="bdg '+bc(isInc?e.rv:e.wh)+'">'+(isInc?e.rv:e.wh)+'</span>'));
  tr.appendChild(td('','<span class="'+(isInc?'ti':'te')+'">'+(isInc?'Income':'Expense')+'</span>'));
  if(!isInc){
    var ck=document.createElement('td');ck.style.textAlign='center';
    var dv=document.createElement('div');dv.className='ck'+(e.dn?' on':'');dv.textContent=e.dn?'✓':'';
    (function(fid,dn){dv.onclick=function(){tgDn(fid,dn);};})(e._fid,e.dn);
    ck.appendChild(dv);tr.appendChild(ck);
  }else{tr.appendChild(td('',''));}
  var ac=document.createElement('td');
  var be=document.createElement('button');be.className='ibed';be.textContent='✎';be.title='Edit';
  (function(tp,fid){be.onclick=function(){opEdit(tp,fid);};})(isInc?'i':'e',e._fid);
  var bd=document.createElement('button');bd.className='ibde';bd.textContent='✕';bd.title='Delete';
  (function(tp,fid){bd.onclick=function(){tp==='i'?dlInc(fid):dlExp(fid);};})(isInc?'i':'e',e._fid);
  ac.appendChild(be);ac.appendChild(bd);tr.appendChild(ac);
  return tr;
}

// Table display
function dTable(){
  var tb=document.getElementById('tb');tb.innerHTML='';
  if(TAB==='inc'){
    var sr=INCS.slice().sort(function(a,b){return b.dt.localeCompare(a.dt);});
    document.getElementById('cbn').textContent=sr.length;
    if(!sr.length){var r=document.createElement('tr');var c=document.createElement('td');c.colSpan=7;c.innerHTML='<div style="text-align:center;padding:40px;color:var(--mu)">No income yet.</div>';r.appendChild(c);tb.appendChild(r);return;}
    sr.forEach(function(e){tb.appendChild(makeRow(e,true));});return;
  }
  var fp=document.getElementById('fp').value,fc=document.getElementById('fc').value;
  var fs=document.getElementById('fs').value.toLowerCase();
  var data=EXPS.slice();
  if(TAB==='todo')data=data.filter(function(e){return!e.dn;});
  if(fp)data=data.filter(function(e){return e.wh===fp;});
  if(fc)data=data.filter(function(e){return e.ct===fc;});
  if(fs)data=data.filter(function(e){return(e.ds||'').toLowerCase().includes(fs)||e.wh.toLowerCase().includes(fs)||e.ct.toLowerCase().includes(fs);});
  data.sort(function(a,b){
    var av=SCOL==='dt'?a.dt:SCOL==='ds'?a.ds||'':SCOL==='am'?a.am:a.wh;
    var bv=SCOL==='dt'?b.dt:SCOL==='ds'?b.ds||'':SCOL==='am'?b.am:b.wh;
    return av<bv?SDIR:av>bv?-SDIR:0;
  });
  var rows=[];
  if(TAB==='all'){
    data.forEach(function(e){rows.push({t:'e',e:e});});
    INCS.forEach(function(e){rows.push({t:'i',e:e});});
    rows.sort(function(a,b){return b.e.dt.localeCompare(a.e.dt);});
  }else{data.forEach(function(e){rows.push({t:'e',e:e});});}
  document.getElementById('cbn').textContent=rows.length;
  if(!rows.length){
    var r=document.createElement('tr');var c=document.createElement('td');c.colSpan=7;
    c.innerHTML='<div style="text-align:center;padding:40px;color:var(--mu)">'+(TAB==='todo'?'All caught up! ✅':'No entries yet.')+'</div>';
    r.appendChild(c);tb.appendChild(r);return;
  }
  rows.forEach(function(row){tb.appendChild(makeRow(row.e,row.t==='i'));});
}

// Totals
function dTots(){
  var el=document.getElementById('totv');el.innerHTML='';
  ['Ansar Babu','Ubaid','Hassan','Ayaz'].forEach(function(p){
    var rows=[],tot=0,pnd=0;
    EXPS.forEach(function(e){if(e.wh===p)rows.push(e);});
    rows.sort(function(a,b){return b.dt.localeCompare(a.dt);});
    rows.forEach(function(e){tot+=e.am;if(!e.dn)pnd++;});
    var pg=document.createElement('div');pg.className='pg';
    var hd=document.createElement('div');hd.className='pgh';
    hd.innerHTML='<div style="display:flex;align-items:center;gap:8px"><span class="bdg '+bc(p)+'">'+p+'</span><span style="font-size:.66rem;color:var(--mu2)">'+rows.length+' entries · '+pnd+' pending</span></div><div class="rp" style="font-weight:700">'+mn(tot)+'</div>';
    pg.appendChild(hd);
    var body=document.createElement('div');
    if(!rows.length){var r=document.createElement('div');r.className='pgr';r.style.color='var(--mu)';r.textContent='No entries';body.appendChild(r);}
    else rows.forEach(function(e){
      var r=document.createElement('div');r.className='pgr';
      r.innerHTML='<span class="pgrd">'+fd(e.dt)+'</span><span class="pgrdsc">'+(e.ds||'—')+'</span><span class="cb">'+e.ct+'</span><span class="pgra">'+mn(e.am)+'</span>';
      var ck=document.createElement('div');ck.className='ck'+(e.dn?' on':'');ck.textContent=e.dn?'✓':'';ck.style.marginLeft='6px';
      (function(fid,dn){ck.onclick=function(){tgDn(fid,dn);};})(e._fid,e.dn);
      r.appendChild(ck);body.appendChild(r);
    });
    pg.appendChild(body);el.appendChild(pg);
  });
}

// Categories
function dCats(){
  var el=document.getElementById('catsb');el.innerHTML='';

    if(!arr.length)return;
    var h=document.createElement('div');h.style.marginBottom='16px';

// Statement
function dStmt(){
  var fr=document.getElementById('sf').value,to=document.getElementById('st').value;
  var pu=document.getElementById('spu').value;
  var el=document.getElementById('stmtb');el.innerHTML='';
  var PP=pu?[pu]:['Ansar Babu','Ubaid','Hassan','Ayaz','Admin'];
  var AVCOLS={'Ansar Babu':'ba','Ubaid':'bu','Hassan':'bh','Ayaz':'by','Admin':'bg'};
  var any=false;
  PP.forEach(function(p){
    var pE=[],pI=[];
    EXPS.forEach(function(e){if(e.wh===p&&!(fr&&e.dt<fr)&&!(to&&e.dt>to))pE.push(e);});
    INCS.forEach(function(i){if(i.rv===p&&!(fr&&i.dt<fr)&&!(to&&i.dt>to))pI.push(i);});
    if(!pE.length&&!pI.length)return;
    any=true;
    var all=[];
    pI.forEach(function(i){all.push({dt:i.dt,ds:i.ds,ct:i.ct,am:i.am,type:'i'});});
    pE.forEach(function(e){all.push({dt:e.dt,ds:e.ds,ct:e.ct,am:e.am,type:'e'});});
    all.sort(function(a,b){return a.dt.localeCompare(b.dt);});
    var tI=0,tE=0;
    pI.forEach(function(i){tI+=i.am;});pE.forEach(function(e){tE+=e.am;});
    var finalBal=tI-tE;
    var card=document.createElement('div');card.className='stc';
    var hd=document.createElement('div');hd.className='sth';
    var left=document.createElement('div');left.className='sth-left';
    var av=document.createElement('div');av.className='sth-avatar bdg '+(AVCOLS[p]||'bg');av.textContent=p.slice(0,2).toUpperCase();
    var info=document.createElement('div');
    var nm=document.createElement('div');nm.className='sth-name';nm.textContent=p;
    var mt=document.createElement('div');mt.className='sth-meta';mt.textContent=pI.length+' income · '+pE.length+' expenses';
    info.appendChild(nm);info.appendChild(mt);left.appendChild(av);left.appendChild(info);
    var bBox=document.createElement('div');bBox.className='sth-bal';
    var bLbl=document.createElement('div');bLbl.className='sth-bal-lbl';bLbl.textContent='Balance';
    var bVal=document.createElement('div');bVal.className='sth-bal-val '+(finalBal>=0?'gp':'rp');
    bVal.textContent=(finalBal>=0?'+':'')+mn(finalBal);
    bBox.appendChild(bLbl);bBox.appendChild(bVal);hd.appendChild(left);hd.appendChild(bBox);card.appendChild(hd);
    var tbl=document.createElement('table');tbl.className='stbl';
    var thead=document.createElement('thead');var hr=document.createElement('tr');
    ['Date','Description','Category'].forEach(function(t){var th=document.createElement('th');th.textContent=t;hr.appendChild(th);});
    ['Income','Expense','Balance'].forEach(function(t){var th=document.createElement('th');th.className='r';th.textContent=t;hr.appendChild(th);});
    thead.appendChild(hr);tbl.appendChild(thead);
    var tbody=document.createElement('tbody'),running=0;
    all.forEach(function(row){
      var isI=row.type==='i';if(isI)running+=row.am;else running-=row.am;
      var tr=document.createElement('tr');
      function mkTd(cls,txt){var c=document.createElement('td');c.className=cls||'';c.textContent=txt||'';return c;}
      tr.appendChild(mkTd('td-date',fd(row.dt)));tr.appendChild(mkTd('',row.ds||'—'));
      var cTd=document.createElement('td');var cSp=document.createElement('span');cSp.className='td-cat';cSp.textContent=row.ct;cTd.appendChild(cSp);tr.appendChild(cTd);
      tr.appendChild(mkTd('r'+(isI?' td-inc':''),isI?mn(row.am):''));
      tr.appendChild(mkTd('r'+(!isI?' td-exp':''),!isI?mn(row.am):''));
      tr.appendChild(mkTd('r '+(running>=0?'td-bal-pos':'td-bal-neg'),mn(running)));
      tbody.appendChild(tr);
    });
    var trF=document.createElement('tr');trF.className='fr-row';
    var tdL=document.createElement('td');tdL.colSpan=3;tdL.style.cssText='font-size:.62rem;color:var(--mu2);text-transform:uppercase;letter-spacing:1px;padding:12px 16px;font-weight:700';tdL.textContent='Total';trF.appendChild(tdL);
    var tdI=document.createElement('td');tdI.className='r td-inc';tdI.textContent=mn(tI);trF.appendChild(tdI);
    var tdE=document.createElement('td');tdE.className='r td-exp';tdE.textContent=mn(tE);trF.appendChild(tdE);
    var tdB=document.createElement('td');tdB.className='r '+(finalBal>=0?'td-bal-pos':'td-bal-neg');tdB.textContent=mn(finalBal);trF.appendChild(tdB);
    tbody.appendChild(trF);tbl.appendChild(tbody);card.appendChild(tbl);el.appendChild(card);
  });
  if(!any){
    var d=document.createElement('div');d.style.cssText='text-align:center;padding:60px 20px;color:var(--mu)';
    d.innerHTML='<div style="font-size:2.5rem;margin-bottom:12px">📋</div><div style="font-size:.88rem">No data found for selected filters.</div>';
    el.appendChild(d);
  }
}
window.dStmt=dStmt;

// Excel export (all data)
function exportExcel(){
  var wb=XLSX.utils.book_new();
  // Expenses sheet
  var eData=[['Date','Description','Category','Amount SAR','Paid By','Entered']];
  EXPS.forEach(function(e){eData.push([e.dt,e.ds||'',e.ct,e.am,e.wh,e.dn?'Yes':'No']);});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(eData),'Expenses');
  // Income sheet
  var iData=[['Date','Description','Category','Amount SAR','Received By']];
  INCS.forEach(function(i){iData.push([i.dt,i.ds||'',i.ct,i.am,i.rv]);});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(iData),'Income');
  // Summary sheet
  var sData=[['Person','Total Expenses','Total Income','Balance']];
  ['Ansar Babu','Ubaid','Hassan','Ayaz'].forEach(function(p){
    var pe=0,pi=0;
    EXPS.forEach(function(e){if(e.wh===p)pe+=e.am;});
    INCS.forEach(function(i){if(i.rv===p)pi+=i.am;});
    sData.push([p,pe,pi,pi-pe]);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(sData),'Summary');
  XLSX.writeFile(wb,'PettyCash_TAJ_'+new Date().toISOString().slice(0,10)+'.xlsx');
  toast('Excel downloaded ✅');
}
window.exportExcel=exportExcel;

// Excel export (statement filtered)
function exportStmtExcel(){
  var fr=document.getElementById('sf').value,to=document.getElementById('st').value;
  var pu=document.getElementById('spu').value;
  var wb=XLSX.utils.book_new();
  var PP=pu?[pu]:['Ansar Babu','Ubaid','Hassan','Ayaz','Admin'];

    var pE=[],pI=[];
    EXPS.forEach(function(e){if(e.wh===p&&!(fr&&e.dt<fr)&&!(to&&e.dt>to))pE.push(e);});
    INCS.forEach(function(i){if(i.rv===p&&!(fr&&i.dt<fr)&&!(to&&i.dt>to))pI.push(i);});

  var win=window.open('','_blank');

  win.document.close();setTimeout(function(){win.print();},600);
}
